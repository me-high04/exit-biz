<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intră în cont — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); flex-direction: column; gap: 1rem; }
    .auth-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.07); }
    .auth-logo { display: block; text-align: center; font-family: var(--font-display); font-size: 24px; font-weight: 300; color: var(--text-primary); margin-bottom: 0.25rem; }
    .auth-logo span { color: var(--green); font-weight: 600; }
    .auth-title { text-align: center; font-size: 20px; font-weight: 400; margin-bottom: 0.4rem; color: var(--text-primary); }
    .auth-sub { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; }
    .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 1.75rem; overflow: hidden; }
    .auth-tab { flex: 1; padding: 9px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--text-secondary); transition: background 0.15s, color 0.15s; font-family: var(--font-body); }
    .auth-tab.active { background: var(--green); color: #fff; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { font-size: 13px; font-weight: 500; color: var(--text-primary); display: block; margin-bottom: 5px; }
    .auth-form input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); background: var(--bg); color: var(--text-primary); transition: border-color 0.15s; }
    .auth-form input:focus { outline: none; border-color: var(--green); }
    .auth-form input.error { border-color: #e53e3e; }
    .auth-btn { margin-top: 6px; }
    .auth-error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; display: none; }
    .auth-error.show { display: block; }
    .auth-success { background: var(--green-light); border: 1px solid var(--green); color: var(--green-dark); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; display: none; }
    .auth-success.show { display: block; }
    .auth-lang { display: flex; justify-content: center; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; color: var(--text-muted); font-size: 13px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-social { display: flex; flex-direction: column; gap: 10px; }
    .auth-social-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 10px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: var(--font-body); transition: background 0.15s, border-color 0.15s;
      width: 100%; text-decoration: none;
    }
    .auth-social-btn.google { background: #fff; border: 1.5px solid var(--border); color: var(--text-primary); }
    .auth-social-btn.google:hover { background: var(--bg-surface); border-color: #aaa; }
    .auth-social-btn.apple  { background: #000; border: 1.5px solid #000; color: #fff; }
    .auth-social-btn.apple:hover  { background: #222; }
    .auth-social-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="auth-page">

    <div class="auth-lang">
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn lang-ro" data-lang="ro">RO</button>
        <button class="lang-btn lang-en" data-lang="en">EN</button>
      </div>
    </div>

    <div class="auth-card">
      <a href="/" class="auth-logo">exit<span>biz</span></a>
      <p class="auth-sub" data-ro="Urmărește statusul dosarului tău" data-en="Track your case status">Urmărește statusul dosarului tău</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')" data-ro="Intră în cont" data-en="Sign in">Intră în cont</button>
        <button class="auth-tab" id="tab-signup" onclick="showTab('signup')" data-ro="Înregistrare" data-en="Register">Înregistrare</button>
      </div>

      <div id="error-box" class="auth-error"></div>
      <div id="success-box" class="auth-success"></div>

      <!-- LOGIN -->
      <form class="auth-form" id="form-login">
        <div>
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="ion@firma.ro" required />
        </div>
        <div>
          <label for="login-password" data-ro="Parolă" data-en="Password">Parolă</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary btn-full auth-btn" id="login-btn" data-ro="Intră în cont →" data-en="Sign in →">Intră în cont →</button>
      </form>

      <!-- SIGNUP -->
      <form class="auth-form" id="form-signup" style="display:none">
        <div>
          <label for="signup-name" data-ro="Numele tău" data-en="Your name">Numele tău</label>
          <input type="text" id="signup-name" placeholder="Ion Popescu" required />
        </div>
        <div>
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="ion@firma.ro" required />
        </div>
        <div>
          <label for="signup-password" data-ro="Parolă" data-en="Password">Parolă</label>
          <input type="password" id="signup-password" data-placeholder-ro="Minim 6 caractere" data-placeholder-en="At least 6 characters" placeholder="Minim 6 caractere" required />
        </div>
        <button type="submit" class="btn-primary btn-full auth-btn" id="signup-btn" data-ro="Creează cont →" data-en="Create account →">Creează cont →</button>
      </form>

      <!-- SOCIAL LOGIN -->
      <div class="auth-divider"><span data-ro="sau continuă cu" data-en="or continue with">sau continuă cu</span></div>
      <div class="auth-social">
        <button class="auth-social-btn google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span data-ro="Continuă cu Google" data-en="Continue with Google">Continuă cu Google</span>
        </button>
        <button class="auth-social-btn apple" onclick="signInWithApple()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          <span data-ro="Continuă cu Apple" data-en="Continue with Apple">Continuă cu Apple</span>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ---- TRANSLATIONS for JS-generated strings ----
    const T = {
      ro: {
        loading_login: 'Se încarcă...',
        loading_signup: 'Se creează contul...',
        error_login: 'Email sau parolă incorectă.',
        success_signup: 'Cont creat! Verifică emailul pentru confirmare, apoi intră în cont.',
        btn_login: 'Intră în cont →',
        btn_signup: 'Creează cont →',
      },
      en: {
        loading_login: 'Loading...',
        loading_signup: 'Creating account...',
        error_login: 'Incorrect email or password.',
        success_signup: 'Account created! Check your email for confirmation, then sign in.',
        btn_login: 'Sign in →',
        btn_signup: 'Create account →',
      }
    };

    function t(key) {
      const lang = localStorage.getItem('lang') || 'ro';
      return T[lang]?.[key] || T.ro[key];
    }

    function showTab(tab) {
      document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'flex' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      hideMessages();
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success-box').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-box');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error-box').classList.remove('show');
    }

    function hideMessages() {
      document.getElementById('error-box').classList.remove('show');
      document.getElementById('success-box').classList.remove('show');
    }

    async function redirectByRole() {
      const { data: { user } } = await db.auth.getUser();
      if (!user) return;
      const { data: profile } = await db.from('profiles').select('role').eq('id', user.id).single();
      if (profile?.role === 'admin' || profile?.role === 'profesionist') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    // Handle OAuth redirect + normal session check
    db.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
        redirectByRole();
      }
    });

    db.auth.getSession().then(({ data: { session } }) => {
      if (session) redirectByRole();
    });

    async function signInWithGoogle() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/login.html' }
      });
      if (error) showError(error.message);
    }

    async function signInWithApple() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'apple',
        options: { redirectTo: window.location.origin + '/login.html' }
      });
      if (error) showError(error.message);
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = t('loading_login');
      btn.disabled = true;
      hideMessages();

      const { error } = await db.auth.signInWithPassword({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value
      });

      if (error) {
        showError(t('error_login'));
        btn.textContent = t('btn_login');
        btn.disabled = false;
      } else {
        await redirectByRole();
      }
    });

    document.getElementById('form-signup').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.textContent = t('loading_signup');
      btn.disabled = true;
      hideMessages();

      const { error } = await db.auth.signUp({
        email: document.getElementById('signup-email').value.trim(),
        password: document.getElementById('signup-password').value,
        options: { data: { full_name: document.getElementById('signup-name').value.trim() } }
      });

      if (error) {
        showError(error.message);
        btn.textContent = t('btn_signup');
        btn.disabled = false;
      } else {
        showSuccess(t('success_signup'));
        btn.textContent = t('btn_signup');
        btn.disabled = false;
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
