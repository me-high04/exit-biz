<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg); }
    .adm-nav { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .adm-nav-right { display: flex; align-items: center; gap: 1rem; }
    .adm-main { max-width: 960px; margin: 0 auto; padding: 2.5rem 2rem; }
    .adm-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .adm-header h1 { font-size: 24px; font-weight: 500; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 600; color: var(--green); }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .dosar-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .dosar-card-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; cursor: pointer; gap: 1rem; flex-wrap: wrap; }
    .dosar-card-header:hover { background: var(--bg); }
    .dosar-info { flex: 1; min-width: 0; }
    .dosar-firm { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .dosar-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .dosar-actions { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .status-select { font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-white); cursor: pointer; color: var(--text-primary); font-family: inherit; }
    .expand-icon { font-size: 14px; color: var(--text-secondary); transition: transform .2s; }
    .expand-icon.open { transform: rotate(180deg); }
    .dosar-details { display: none; padding: 0 1.5rem 1.5rem; border-top: 1px solid var(--border); }
    .dosar-details.open { display: block; }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.25rem; }
    @media (max-width: 640px) { .details-grid { grid-template-columns: 1fr; } }
    .details-col h4 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: .4px; }
    .note-area { width: 100%; padding: 10px 12px; font-size: 13px; font-family: inherit; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-primary); resize: vertical; min-height: 80px; box-sizing: border-box; }
    .note-area:focus { outline: none; border-color: var(--green); }
    .save-note-btn { margin-top: 8px; font-size: 13px; font-weight: 600; padding: 7px 16px; background: var(--green); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .save-note-btn:disabled { opacity: .6; cursor: not-allowed; }
    .doc-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .doc-item-name { font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; min-width: 0; }
    .doc-item-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .doc-item-date { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
    .doc-download-btn { font-size: 12px; font-weight: 500; color: var(--green); background: var(--green-light); border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .doc-empty { font-size: 13px; color: var(--text-secondary); font-style: italic; padding: 4px 0; }
    .doc-upload-label { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1.5px dashed var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
    .doc-upload-label:hover { border-color: var(--green); color: var(--green); }
    .doc-upload-label input { display: none; }
    .doc-upload-send-btn { margin-top: 8px; font-size: 13px; font-weight: 600; padding: 7px 16px; background: var(--green); color: #fff; border: none; border-radius: 8px; cursor: pointer; display: none; }
    .doc-upload-send-btn:disabled { opacity: .6; cursor: not-allowed; }
    .doc-selected-name { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .client-info-table { font-size: 13px; width: 100%; }
    .client-info-table td { padding: 3px 0; }
    .client-info-table td:first-child { color: var(--text-secondary); width: 90px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-white); border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px; }
    .modal h2 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-primary); }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--bg-white); color: var(--text-primary); box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }
    .btn-sm { padding: 8px 18px; font-size: 14px; }
    .loading-full { text-align: center; padding: 4rem; color: var(--text-secondary); }
  </style>
</head>
<body>

  <nav class="adm-nav">
    <a href="/" class="logo">exit<span>biz</span> <span style="font-size:12px;color:var(--text-secondary);font-weight:400;">admin</span></a>
    <div class="adm-nav-right">
      <span style="font-size:13px;color:var(--text-secondary);" id="admin-email"></span>
      <button class="btn-ghost btn-sm" id="logout-btn">Ieși din cont</button>
    </div>
  </nav>

  <div class="adm-main">
    <div class="adm-header">
      <h1>Dosare clienți</h1>
      <button class="btn-primary btn-sm" onclick="openModal()">+ Dosar nou</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total dosare</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-active">—</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-finalizat">—</div><div class="stat-label">Finalizate</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-docs">—</div><div class="stat-label">Doc. noi azi</div></div>
    </div>

    <div id="dosare-list"><div class="loading-full">Se încarcă...</div></div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Dosar nou</h2>
      <div class="form-group"><label>Nume firmă</label><input id="f-firm" placeholder="Ex: ACME SRL" /></div>
      <div class="form-group"><label>CUI</label><input id="f-cui" placeholder="Ex: 12345678" /></div>
      <div class="form-group"><label>Email client</label><input id="f-email" type="email" placeholder="client@email.com" /></div>
      <div class="form-group"><label>Telefon</label><input id="f-phone" placeholder="07xx xxx xxx" /></div>
      <div class="form-group"><label>Tip serviciu</label>
        <select id="f-service">
          <option value="suspendare">Suspendare activitate</option>
          <option value="dizolvare">Dizolvare voluntară</option>
          <option value="radiere">Radiere ONRC</option>
          <option value="cabinet">Cabinet profesionist</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost btn-sm" onclick="closeModal()">Anulează</button>
        <button class="btn-primary btn-sm" id="create-btn" onclick="createDosar()">Creează dosar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const STATUSES = ['lead','diagnostic','analiza','documente','pregatire','depus','finalizat'];
    const STATUS_LABELS = { lead:'Lead', diagnostic:'Diagnostic', analiza:'Analiză', documente:'Documente', pregatire:'Pregătire', depus:'Depus ONRC', finalizat:'Finalizat' };
    const SERVICE_LABELS = { suspendare:'Suspendare', dizolvare:'Dizolvare', radiere:'Radiere ONRC', cabinet:'Cabinet' };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatDateShort(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short' });
    }

    let allDosare = [];

    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      if (profile?.role !== 'admin') { window.location.href = 'dashboard.html'; return; }
      document.getElementById('admin-email').textContent = session.user.email;
      await loadDosare();
    }

    async function loadDosare() {
      const { data: dosare } = await db.from('dosare').select('*').order('created_at', { ascending: false });
      allDosare = dosare || [];
      renderStats(allDosare);
      renderDosare(allDosare);
    }

    function renderStats(dosare) {
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('stat-total').textContent = dosare.length;
      document.getElementById('stat-active').textContent = dosare.filter(d => d.status !== 'finalizat').length;
      document.getElementById('stat-finalizat').textContent = dosare.filter(d => d.status === 'finalizat').length;
      db.from('documente').select('id', { count: 'exact', head: true }).gte('created_at', today + 'T00:00:00').eq('uploaded_by', 'client').then(({ count }) => {
        document.getElementById('stat-docs').textContent = count ?? 0;
      });
    }

    function renderDosare(dosare) {
      const list = document.getElementById('dosare-list');
      if (!dosare.length) {
        list.innerHTML = '<div class="loading-full" style="padding:3rem;">Niciun dosar încă. Creează primul dosar cu butonul de mai sus.</div>';
        return;
      }
      list.innerHTML = dosare.map(d => renderDosarCard(d)).join('');
    }

    function renderDosarCard(d) {
      const statusOpts = STATUSES.map(s => `<option value="${s}" ${d.status === s ? 'selected' : ''}>${STATUS_LABELS[s]}</option>`).join('');
      const safeId = d.id;
      const safeFirm = (d.firm_name || '').replace(/'/g, "\\'");
      const safeEmail = (d.client_email || '').replace(/'/g, "\\'");
      return `<div class="dosar-card" id="adm-card-${safeId}">
        <div class="dosar-card-header" onclick="toggleDosar('${safeId}')">
          <div class="dosar-info">
            <div class="dosar-firm">${d.firm_name || '—'} <span style="font-weight:400;color:var(--text-secondary);font-size:13px;">${d.cui ? '· RO' + d.cui : ''}</span></div>
            <div class="dosar-sub">${d.client_email || ''} · ${formatDate(d.created_at)}</div>
          </div>
          <div class="dosar-actions" onclick="event.stopPropagation()">
            <select class="status-select" onchange="updateStatus('${safeId}', this.value)">
              ${statusOpts}
            </select>
          </div>
          <span class="expand-icon" id="icon-${safeId}">▼</span>
        </div>
        <div class="dosar-details" id="details-${safeId}">
          <div class="details-grid">
            <div class="details-col">
              <h4>Informații client</h4>
              <table class="client-info-table">
                <tr><td>Firmă</td><td>${d.firm_name || '—'}</td></tr>
                <tr><td>CUI</td><td>${d.cui ? 'RO' + d.cui : '—'}</td></tr>
                <tr><td>Email</td><td>${d.client_email || '—'}</td></tr>
                <tr><td>Telefon</td><td>${d.phone || '—'}</td></tr>
                <tr><td>Serviciu</td><td>${SERVICE_LABELS[d.service_type] || d.service_type || '—'}</td></tr>
              </table>
              <h4 style="margin-top:1.25rem;">Notă pentru client</h4>
              <textarea class="note-area" id="note-${safeId}" placeholder="Notă vizibilă de client în dashboard...">${d.notes || ''}</textarea>
              <button class="save-note-btn" id="save-note-btn-${safeId}" onclick="saveNote('${safeId}')">Salvează nota</button>
            </div>
            <div class="details-col">
              <h4>Documente de la client</h4>
              <div id="client-docs-${safeId}"><div class="doc-empty">Se încarcă...</div></div>
              <h4 style="margin-top:1.25rem;">Documente pentru client</h4>
              <div id="cabinet-docs-${safeId}"><div class="doc-empty">Se încarcă...</div></div>
              <label class="doc-upload-label">
                <input type="file" id="adm-file-${safeId}" onchange="onAdmFileSelected('${safeId}')" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
                + Încarcă document pentru client
              </label>
              <div class="doc-selected-name" id="adm-file-name-${safeId}"></div>
              <button class="doc-upload-send-btn" id="adm-upload-btn-${safeId}" onclick="adminUploadDoc('${safeId}','${safeFirm}','${safeEmail}')">
                Trimite documentul
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }

    async function toggleDosar(dosarId) {
      const details = document.getElementById(`details-${dosarId}`);
      const icon = document.getElementById(`icon-${dosarId}`);
      const isOpen = details.classList.contains('open');
      details.classList.toggle('open', !isOpen);
      icon.classList.toggle('open', !isOpen);
      if (!isOpen) await loadDosarDocs(dosarId);
    }

    async function loadDosarDocs(dosarId) {
      const { data: docs } = await db.from('documente').select('*').eq('dosar_id', dosarId).order('created_at', { ascending: false });
      const all = docs || [];
      const clientEl = document.getElementById(`client-docs-${dosarId}`);
      const cabinetEl = document.getElementById(`cabinet-docs-${dosarId}`);
      const clientDocs = all.filter(d => d.uploaded_by === 'client');
      const cabinetDocs = all.filter(d => d.uploaded_by === 'cabinet');

      clientEl.innerHTML = clientDocs.length
        ? clientDocs.map(d => `<div class="doc-item">
            <div class="doc-item-name">📄 <span>${d.name}</span> <span class="doc-item-date">${formatDateShort(d.created_at)}</span></div>
            <button class="doc-download-btn" onclick="adminDownloadDoc('${d.path}','${d.name}')">Descarcă</button>
          </div>`).join('')
        : '<div class="doc-empty">Niciun document de la client.</div>';

      cabinetEl.innerHTML = cabinetDocs.length
        ? cabinetDocs.map(d => `<div class="doc-item">
            <div class="doc-item-name">📄 <span>${d.name}</span> <span class="doc-item-date">${formatDateShort(d.created_at)}</span></div>
            <button class="doc-download-btn" onclick="adminDownloadDoc('${d.path}','${d.name}')">Descarcă</button>
          </div>`).join('')
        : '<div class="doc-empty">Niciun document încărcat pentru client.</div>';
    }

    async function updateStatus(dosarId, newStatus) {
      await db.from('dosare').update({ status: newStatus }).eq('id', dosarId);
    }

    async function saveNote(dosarId) {
      const note = document.getElementById(`note-${dosarId}`).value;
      const btn = document.getElementById(`save-note-btn-${dosarId}`);
      btn.disabled = true; btn.textContent = 'Se salvează...';
      await db.from('dosare').update({ notes: note }).eq('id', dosarId);
      btn.disabled = false; btn.textContent = 'Salvat ✓';
      setTimeout(() => { btn.textContent = 'Salvează nota'; }, 2000);
    }

    function onAdmFileSelected(dosarId) {
      const input = document.getElementById(`adm-file-${dosarId}`);
      const nameEl = document.getElementById(`adm-file-name-${dosarId}`);
      const btn = document.getElementById(`adm-upload-btn-${dosarId}`);
      if (input.files[0]) {
        nameEl.textContent = input.files[0].name;
        btn.style.display = 'inline-block';
      }
    }

    async function adminUploadDoc(dosarId, firmName, clientEmail) {
      const input = document.getElementById(`adm-file-${dosarId}`);
      const btn = document.getElementById(`adm-upload-btn-${dosarId}`);
      const file = input.files[0];
      if (!file) return;
      btn.disabled = true; btn.textContent = 'Se încarcă...';
      const path = `${dosarId}/${Date.now()}_${file.name}`;
      const { error } = await db.storage.from('documente').upload(path, file);
      if (error) { alert('Eroare upload: ' + error.message); btn.disabled = false; btn.textContent = 'Trimite documentul'; return; }
      await db.from('documente').insert({ dosar_id: dosarId, name: file.name, path, size: file.size, uploaded_by: 'cabinet' });
      await fetch('/.netlify/functions/notify-document', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dosarId, firmName, clientEmail, fileName: file.name, uploadedBy: 'cabinet' })
      });
      btn.disabled = false; btn.textContent = 'Trimis ✓';
      document.getElementById(`adm-file-name-${dosarId}`).textContent = '';
      input.value = '';
      setTimeout(() => { btn.textContent = 'Trimite documentul'; btn.style.display = 'none'; }, 2000);
      await loadDosarDocs(dosarId);
    }

    async function adminDownloadDoc(path, name) {
      const { data, error } = await db.storage.from('documente').createSignedUrl(path, 60);
      if (error || !data?.signedUrl) { alert('Eroare la descărcare.'); return; }
      const a = document.createElement('a');
      a.href = data.signedUrl; a.download = name; a.target = '_blank';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    async function createDosar() {
      const firmName = document.getElementById('f-firm').value.trim();
      const cui = document.getElementById('f-cui').value.trim();
      const email = document.getElementById('f-email').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const serviceType = document.getElementById('f-service').value;
      if (!firmName || !email) { alert('Completează cel puțin numele firmei și emailul clientului.'); return; }
      const btn = document.getElementById('create-btn');
      btn.disabled = true; btn.textContent = 'Se creează...';
      const { error } = await db.from('dosare').insert({ firm_name: firmName, cui, client_email: email, phone, service_type: serviceType, status: 'lead' });
      if (error) { alert('Eroare: ' + error.message); btn.disabled = false; btn.textContent = 'Creează dosar'; return; }
      closeModal();
      ['f-firm','f-cui','f-email','f-phone'].forEach(id => document.getElementById(id).value = '');
      btn.disabled = false; btn.textContent = 'Creează dosar';
      await loadDosare();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'login.html';
    });

    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    init();
  </script>
</body>
</html>
