<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .db-nav { background: var(--text-primary); padding: 0 2rem; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .db-nav .logo { color: #fff; }
    .db-nav .logo span { color: var(--green-mid); }
    .db-nav-right { display: flex; align-items: center; gap: 1rem; }
    .db-nav .lang-selector { background: rgba(255,255,255,0.1); }
    .db-nav .lang-btn { color: rgba(255,255,255,0.6); }
    .db-nav .lang-btn.active { background: rgba(255,255,255,0.15); color: #fff; box-shadow: none; }
    .admin-badge { font-size: 11px; font-weight: 500; background: var(--green); color: #fff; padding: 3px 10px; border-radius: 99px; }
    .admin-main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .admin-header h1 { font-size: 24px; font-weight: 300; color: var(--text-primary); }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; cursor: pointer; transition: border-color 0.15s; }
    .stat-box:hover { border-color: var(--green); }
    .stat-box.active-filter { border-color: var(--green); background: var(--green-light); }
    .stat-box .num { font-size: 32px; font-weight: 600; color: var(--text-primary); line-height: 1; }
    .stat-box .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .stat-box.green .num { color: var(--green); }
    .stat-box.orange .num { color: #d97706; }

    /* Pipeline filter tabs */
    .pipeline-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .pipeline-tab { padding: 5px 14px; font-size: 12px; font-weight: 500; border-radius: 99px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-secondary); font-family: var(--font-body); transition: all 0.15s; }
    .pipeline-tab:hover, .pipeline-tab.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* Table */
    .dosare-table { width: 100%; border-collapse: collapse; background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .dosare-table th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); border-bottom: 1px solid var(--border); background: var(--bg-surface); }
    .dosare-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .dosare-table tr:last-child td { border-bottom: none; }
    .dosare-table tr:hover td { background: var(--bg); cursor: pointer; }
    .status-select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); background: var(--bg); cursor: pointer; max-width: 150px; }
    .status-select:focus { outline: none; border-color: var(--green); }
    .text-muted { color: var(--text-secondary); }
    .dosar-name { font-weight: 500; color: var(--text-primary); }
    .dosar-email { font-size: 11px; color: var(--text-secondary); }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
    .badge-suspendare { background: #dbeafe; color: #1e40af; }
    .badge-dizolvare { background: #fde8d8; color: #9a3412; }
    .badge-radiere { background: #f3e8ff; color: #6b21a8; }
    .badge-cabinet { background: var(--green-light); color: var(--green-dark); }
    .risk-pill { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; display: inline-block; }
    .risk-scazut { background: #d1fae5; color: #065f46; }
    .risk-mediu { background: #fef3c7; color: #92400e; }
    .risk-ridicat { background: #fee2e2; color: #991b1b; }
    .risk-necunoscut { background: #f1f5f9; color: #64748b; }
    .notes-input { width: 100%; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font-body); background: var(--bg); color: var(--text-primary); }
    .notes-input:focus { outline: none; border-color: var(--green); }
    .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .btn-sm { padding: 7px 16px; font-size: 13px; }
    .btn-danger { background: #e53e3e; color: #fff; border: none; padding: 4px 9px; border-radius: var(--radius-sm); font-size: 11px; cursor: pointer; font-family: var(--font-body); }
    .btn-danger:hover { background: #c53030; }
    .btn-icon { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 9px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn-icon:hover { border-color: var(--green); color: var(--green); }

    /* Modal create */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-white); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal h2 { font-size: 20px; font-weight: 400; margin-bottom: 1.5rem; color: var(--text-primary); }
    .modal-form { display: flex; flex-direction: column; gap: 14px; }
    .modal-form label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 4px; }
    .modal-form input, .modal-form select, .modal-form textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); background: var(--bg); color: var(--text-primary); }
    .modal-form input:focus, .modal-form select:focus, .modal-form textarea:focus { outline: none; border-color: var(--green); }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-section { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 4px 0; border-top: 1px solid var(--border); margin-top: 4px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .modal-actions .btn-ghost { flex: 1; justify-content: center; }
    .modal-actions .btn-primary { flex: 2; justify-content: center; }

    /* Fișă dosar drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -560px; width: 100%; max-width: 560px; height: 100vh; background: var(--bg-white); border-left: 1px solid var(--border); z-index: 1000; transition: right 0.3s ease; overflow-y: auto; }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-white); z-index: 10; }
    .drawer-header h2 { font-size: 18px; font-weight: 400; color: var(--text-primary); }
    .drawer-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 4px; }
    .drawer-body { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .drawer-section { display: flex; flex-direction: column; gap: 0; }
    .drawer-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.75rem; }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .drawer-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    .drawer-field input, .drawer-field select, .drawer-field textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body); background: var(--bg); color: var(--text-primary); }
    .drawer-field input:focus, .drawer-field select:focus, .drawer-field textarea:focus { outline: none; border-color: var(--green); }
    .drawer-field.full { grid-column: 1 / -1; }
    .drawer-actions { display: flex; gap: 10px; padding: 1.5rem 2rem; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--bg-white); }
    .save-indicator { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .save-indicator.saved { color: var(--green); }

    /* Pipeline badge in drawer */
    .pipeline-display { display: flex; gap: 6px; flex-wrap: wrap; }
    .pipeline-step-pill { padding: 4px 12px; font-size: 12px; border-radius: 99px; border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }
    .pipeline-step-pill.active { background: var(--green); color: #fff; border-color: var(--green); }
    .pipeline-step-pill.done { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }
  </style>
</head>
<body>

  <nav class="db-nav">
    <a href="/" class="logo">exit<span>biz</span></a>
    <div class="db-nav-right">
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn lang-ro" data-lang="ro">RO</button>
        <button class="lang-btn lang-en" data-lang="en">EN</button>
      </div>
      <span class="admin-badge">Admin</span>
      <button class="btn-ghost btn-sm" id="logout-btn" style="color:#fff;border-color:rgba(255,255,255,0.3);" data-ro="Ieși din cont" data-en="Sign out">Ieși din cont</button>
    </div>
  </nav>

  <div class="admin-main">
    <div class="admin-header">
      <h1 data-ro="Panou administrare" data-en="Admin panel">Panou administrare</h1>
      <button class="btn-primary" id="new-dosar-btn" data-ro="+ Dosar nou" data-en="+ New case">+ Dosar nou</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box" onclick="filterByStatus('')" id="stat-box-all">
        <div class="num" id="stat-total">—</div>
        <div class="lbl" data-ro="Total dosare" data-en="Total cases">Total dosare</div>
      </div>
      <div class="stat-box orange" onclick="filterByStatus('lead')" id="stat-box-lead">
        <div class="num" id="stat-lead">—</div>
        <div class="lbl" data-ro="Lead-uri noi" data-en="New leads">Lead-uri noi</div>
      </div>
      <div class="stat-box" onclick="filterByStatus('activ')" id="stat-box-activ">
        <div class="num" id="stat-active">—</div>
        <div class="lbl" data-ro="În lucru" data-en="In progress">În lucru</div>
      </div>
      <div class="stat-box green" onclick="filterByStatus('finalizat')" id="stat-box-done">
        <div class="num" id="stat-done">—</div>
        <div class="lbl" data-ro="Finalizate" data-en="Completed">Finalizate</div>
      </div>
    </div>

    <!-- Pipeline filter tabs -->
    <div class="pipeline-tabs" id="pipeline-tabs"></div>

    <div id="table-container">
      <div class="loading" data-ro="Se încarcă dosarele..." data-en="Loading cases...">Se încarcă dosarele...</div>
    </div>
  </div>

  <!-- MODAL: Dosar nou -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 data-ro="Dosar nou" data-en="New case">Dosar nou</h2>
      <form class="modal-form" id="modal-form">
        <div class="modal-section" data-ro="Date client" data-en="Client details">Date client</div>
        <div class="modal-row">
          <div>
            <label data-ro="Nume client *" data-en="Client name *">Nume client *</label>
            <input type="text" id="f-name" placeholder="Ion Popescu" required />
          </div>
          <div>
            <label data-ro="Telefon" data-en="Phone">Telefon</label>
            <input type="text" id="f-phone" placeholder="+40 7xx xxx xxx" />
          </div>
        </div>
        <div class="modal-row">
          <div>
            <label data-ro="Email client *" data-en="Client email *">Email client *</label>
            <input type="email" id="f-email" placeholder="ion@firma.ro" required />
          </div>
          <div>
            <label data-ro="CUI / Nr. Reg. Com." data-en="CUI / Trade Reg. No.">CUI / Nr. Reg. Com.</label>
            <input type="text" id="f-cui" placeholder="RO12345678" />
          </div>
        </div>

        <div class="modal-section" data-ro="Dosar" data-en="Case">Dosar</div>
        <div class="modal-row">
          <div>
            <label data-ro="Tip serviciu *" data-en="Service type *">Tip serviciu *</label>
            <select id="f-service" required>
              <option value="" id="opt-select">— Selectează —</option>
              <option value="suspendare">Suspendare activitate</option>
              <option value="dizolvare">Dizolvare voluntară</option>
              <option value="radiere">Radiere ONRC</option>
              <option value="cabinet">Cabinet profesionist</option>
            </select>
          </div>
          <div>
            <label data-ro="Nivel risc" data-en="Risk level">Nivel risc</label>
            <select id="f-risk">
              <option value="necunoscut">— Necunoscut —</option>
              <option value="scazut">Scăzut</option>
              <option value="mediu">Mediu</option>
              <option value="ridicat">Ridicat</option>
            </select>
          </div>
        </div>
        <div>
          <label data-ro="Procedură recomandată" data-en="Recommended procedure">Procedură recomandată</label>
          <input type="text" id="f-procedure" placeholder="ex: Dizolvare + radiere ONRC în 3 luni" />
        </div>
        <div>
          <label data-ro="Notă internă (opțional)" data-en="Internal note (optional)">Notă internă (opțional)</label>
          <textarea id="f-notes" rows="2" placeholder="Detalii suplimentare..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="modal-cancel" data-ro="Anulează" data-en="Cancel">Anulează</button>
          <button type="submit" class="btn-primary" id="modal-submit" data-ro="Creează dosarul →" data-en="Create case →">Creează dosarul →</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DRAWER: Fișă dosar -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h2 id="drawer-title">Fișă dosar</h2>
      <button class="drawer-close" id="drawer-close">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"><!-- filled by JS --></div>
    <div class="drawer-actions">
      <button class="btn-primary" id="drawer-save" data-ro="Salvează modificările" data-en="Save changes">Salvează modificările</button>
      <span class="save-indicator" id="save-indicator"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ── BILINGUAL LABELS ─────────────────────────────────────────────────
    const AL = {
      ro: {
        pipeline: ['Lead','Diagnostic','Analiză','Documente','Pregătire','Depus','Finalizat'],
        pipelineKeys: ['lead','diagnostic','analiza','documente','pregatire','depus','finalizat'],
        filterAll: 'Toate',
        services: { suspendare:'Suspendare activitate', dizolvare:'Dizolvare voluntară', radiere:'Radiere ONRC', cabinet:'Cabinet profesionist' },
        risk: { scazut:'Scăzut', mediu:'Mediu', ridicat:'Ridicat', necunoscut:'Necunoscut' },
        th: ['Client','CUI','Serviciu','Status','Risc','Notă','Data',''],
        empty: 'Nu există dosare.',
        loading_create: 'Se creează...', btn_create: 'Creează dosarul →',
        confirm_delete: 'Ești sigur că vrei să ștergi acest dosar?',
        drawer_title: 'Fișă dosar',
        saved: '✓ Salvat', saving: 'Se salvează...',
        section_client: 'Date client', section_dosar: 'Dosar', section_resp: 'Responsabili',
        lbl: { name:'Nume client', email:'Email', phone:'Telefon', cui:'CUI', service:'Tip serviciu', status:'Status', risk:'Nivel risc', procedure:'Procedură recomandată', notes:'Notă internă', operator:'Operator', accountant:'Contabil', liquidator:'Lichidator', lawyer:'Avocat' },
        select_ph: '— Selectează —',
        opt_suspendare:'Suspendare activitate', opt_dizolvare:'Dizolvare voluntară', opt_radiere:'Radiere ONRC', opt_cabinet:'Cabinet profesionist',
        opt_risk_unk:'— Necunoscut —', opt_risk_s:'Scăzut', opt_risk_m:'Mediu', opt_risk_r:'Ridicat',
        notes_ph: 'Detalii suplimentare...',
      },
      en: {
        pipeline: ['Lead','Diagnostic','Analysis','Documents','Preparation','Filed','Completed'],
        pipelineKeys: ['lead','diagnostic','analiza','documente','pregatire','depus','finalizat'],
        filterAll: 'All',
        services: { suspendare:'Activity suspension', dizolvare:'Voluntary dissolution', radiere:'ONRC Strike-off', cabinet:'Professional office' },
        risk: { scazut:'Low', mediu:'Medium', ridicat:'High', necunoscut:'Unknown' },
        th: ['Client','CUI','Service','Status','Risk','Note','Date',''],
        empty: 'No cases yet.',
        loading_create: 'Creating...', btn_create: 'Create case →',
        confirm_delete: 'Are you sure you want to delete this case?',
        drawer_title: 'Case file',
        saved: '✓ Saved', saving: 'Saving...',
        section_client: 'Client details', section_dosar: 'Case', section_resp: 'Responsible parties',
        lbl: { name:'Client name', email:'Email', phone:'Phone', cui:'CUI', service:'Service type', status:'Status', risk:'Risk level', procedure:'Recommended procedure', notes:'Internal note', operator:'Operator', accountant:'Accountant', liquidator:'Liquidator', lawyer:'Lawyer' },
        select_ph: '— Select —',
        opt_suspendare:'Activity suspension', opt_dizolvare:'Voluntary dissolution', opt_radiere:'ONRC Strike-off', opt_cabinet:'Professional office',
        opt_risk_unk:'— Unknown —', opt_risk_s:'Low', opt_risk_m:'Medium', opt_risk_r:'High',
        notes_ph: 'Additional details...',
      }
    };

    function L(key) { return AL[localStorage.getItem('lang')||'ro']?.[key] ?? AL.ro[key]; }

    // ── STATE ────────────────────────────────────────────────────────────
    let allDosare = [];
    let activeFilter = '';
    let openDosarId = null;

    // ── PIPELINE TABS ────────────────────────────────────────────────────
    function renderPipelineTabs() {
      const labels = L('pipeline');
      const keys = L('pipelineKeys');
      const tabs = document.getElementById('pipeline-tabs');
      tabs.innerHTML = `<button class="pipeline-tab ${activeFilter===''?'active':''}" onclick="filterByStatus('')">${L('filterAll')}</button>` +
        keys.map((k,i) => `<button class="pipeline-tab ${activeFilter===k?'active':''}" onclick="filterByStatus('${k}')">${labels[i]}</button>`).join('');
    }

    function filterByStatus(status) {
      activeFilter = status;
      renderPipelineTabs();
      renderTable(activeFilter === 'activ'
        ? allDosare.filter(d => !['lead','finalizat'].includes(d.status))
        : activeFilter === ''
          ? allDosare
          : allDosare.filter(d => d.status === activeFilter)
      );
    }

    // ── TABLE ────────────────────────────────────────────────────────────
    function renderTable(dosare) {
      const container = document.getElementById('table-container');
      if (!dosare.length) { container.innerHTML = `<div class="loading">${L('empty')}</div>`; return; }
      const ths = L('th');
      const services = L('services');
      const risk = L('risk');
      const statuses = L('pipeline');
      const keys = L('pipelineKeys');

      const rows = dosare.map(d => {
        const sLabel = services[d.service_type] || d.service_type;
        const statusLabel = statuses[keys.indexOf(d.status)] || d.status;
        const riskLabel = risk[d.risk_level || 'necunoscut'];
        const riskCls = `risk-${d.risk_level || 'necunoscut'}`;
        return `<tr onclick="openDrawer('${d.id}')" style="cursor:pointer">
          <td>
            <div class="dosar-name">${d.client_name}</div>
            <div class="dosar-email">${d.client_email}</div>
          </td>
          <td class="text-muted" style="font-size:12px">${d.cui || '—'}</td>
          <td><span class="badge badge-${d.service_type}">${sLabel}</span></td>
          <td onclick="event.stopPropagation()">
            <select class="status-select" onchange="updateStatus('${d.id}', this.value)">
              ${keys.map((k,i) => `<option value="${k}" ${k===d.status?'selected':''}>${statuses[i]}</option>`).join('')}
            </select>
          </td>
          <td><span class="risk-pill ${riskCls}">${riskLabel}</span></td>
          <td onclick="event.stopPropagation()">
            <input class="notes-input" type="text" value="${d.notes||''}" placeholder="—" onblur="updateNotes('${d.id}', this.value)" style="width:120px" />
          </td>
          <td class="text-muted" style="font-size:11px;white-space:nowrap">${formatDate(d.created_at)}</td>
          <td onclick="event.stopPropagation()"><button class="btn-danger" onclick="deleteDosar('${d.id}')">✕</button></td>
        </tr>`;
      }).join('');

      container.innerHTML = `<table class="dosare-table">
        <thead><tr>${ths.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // ── STATS ────────────────────────────────────────────────────────────
    function updateStats(dosare) {
      document.getElementById('stat-total').textContent = dosare.length;
      document.getElementById('stat-lead').textContent = dosare.filter(d => d.status === 'lead').length;
      document.getElementById('stat-active').textContent = dosare.filter(d => !['lead','finalizat'].includes(d.status)).length;
      document.getElementById('stat-done').textContent = dosare.filter(d => d.status === 'finalizat').length;
    }

    // ── DRAWER: Fișă dosar ────────────────────────────────────────────────
    function openDrawer(id) {
      const d = allDosare.find(x => x.id === id);
      if (!d) return;
      openDosarId = id;

      const keys = L('pipelineKeys');
      const labels = L('pipeline');
      const curIdx = keys.indexOf(d.status);
      const pipelineHtml = keys.map((k,i) => {
        const cls = i < curIdx ? 'done' : i === curIdx ? 'active' : '';
        return `<span class="pipeline-step-pill ${cls}">${labels[i]}</span>`;
      }).join('');

      const services = L('services');
      const risk = L('risk');
      const lbl = L('lbl');
      const keys2 = L('pipelineKeys');
      const labels2 = L('pipeline');

      document.getElementById('drawer-title').textContent = `${L('drawer_title')} — ${d.client_name}`;
      document.getElementById('drawer-body').innerHTML = `
        <div class="drawer-section">
          <div class="pipeline-display">${pipelineHtml}</div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">${L('section_client')}</div>
          <div class="drawer-grid">
            <div class="drawer-field"><label>${lbl.name}</label><input id="d-name" type="text" value="${d.client_name||''}" /></div>
            <div class="drawer-field"><label>${lbl.phone}</label><input id="d-phone" type="text" value="${d.phone||''}" placeholder="+40 7xx..." /></div>
            <div class="drawer-field"><label>${lbl.email}</label><input id="d-email" type="email" value="${d.client_email||''}" /></div>
            <div class="drawer-field"><label>${lbl.cui}</label><input id="d-cui" type="text" value="${d.cui||''}" /></div>
          </div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">${L('section_dosar')}</div>
          <div class="drawer-grid">
            <div class="drawer-field">
              <label>${lbl.service}</label>
              <select id="d-service">
                ${['suspendare','dizolvare','radiere','cabinet'].map(v=>`<option value="${v}" ${v===d.service_type?'selected':''}>${services[v]}</option>`).join('')}
              </select>
            </div>
            <div class="drawer-field">
              <label>${lbl.status}</label>
              <select id="d-status">
                ${keys2.map((k,i)=>`<option value="${k}" ${k===d.status?'selected':''}>${labels2[i]}</option>`).join('')}
              </select>
            </div>
            <div class="drawer-field">
              <label>${lbl.risk}</label>
              <select id="d-risk">
                <option value="necunoscut" ${(d.risk_level||'necunoscut')==='necunoscut'?'selected':''}>${L('opt_risk_unk')}</option>
                <option value="scazut" ${d.risk_level==='scazut'?'selected':''}>${L('opt_risk_s')}</option>
                <option value="mediu" ${d.risk_level==='mediu'?'selected':''}>${L('opt_risk_m')}</option>
                <option value="ridicat" ${d.risk_level==='ridicat'?'selected':''}>${L('opt_risk_r')}</option>
              </select>
            </div>
            <div class="drawer-field full"><label>${lbl.procedure}</label><input id="d-procedure" type="text" value="${d.procedure_rec||''}" placeholder="ex: Dizolvare + radiere în 3 luni" /></div>
            <div class="drawer-field full"><label>${lbl.notes}</label><textarea id="d-notes" rows="2">${d.notes||''}</textarea></div>
          </div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">${L('section_resp')}</div>
          <div class="drawer-grid">
            <div class="drawer-field"><label>${lbl.operator}</label><input id="d-operator" type="text" value="${d.resp_operator||''}" /></div>
            <div class="drawer-field"><label>${lbl.accountant}</label><input id="d-accountant" type="text" value="${d.resp_accountant||''}" /></div>
            <div class="drawer-field"><label>${lbl.liquidator}</label><input id="d-liquidator" type="text" value="${d.resp_liquidator||''}" /></div>
            <div class="drawer-field"><label>${lbl.lawyer}</label><input id="d-lawyer" type="text" value="${d.resp_lawyer||''}" /></div>
          </div>
        </div>
      `;

      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.getElementById('save-indicator').textContent = '';
      document.getElementById('save-indicator').className = 'save-indicator';
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      openDosarId = null;
    }

    async function saveDrawer() {
      if (!openDosarId) return;
      const indicator = document.getElementById('save-indicator');
      indicator.textContent = L('saving');
      indicator.className = 'save-indicator';

      const updates = {
        client_name:     document.getElementById('d-name').value.trim(),
        client_email:    document.getElementById('d-email').value.trim(),
        phone:           document.getElementById('d-phone').value.trim() || null,
        cui:             document.getElementById('d-cui').value.trim() || null,
        service_type:    document.getElementById('d-service').value,
        status:          document.getElementById('d-status').value,
        risk_level:      document.getElementById('d-risk').value,
        procedure_rec:   document.getElementById('d-procedure').value.trim() || null,
        notes:           document.getElementById('d-notes').value.trim() || null,
        resp_operator:   document.getElementById('d-operator').value.trim() || null,
        resp_accountant: document.getElementById('d-accountant').value.trim() || null,
        resp_liquidator: document.getElementById('d-liquidator').value.trim() || null,
        resp_lawyer:     document.getElementById('d-lawyer').value.trim() || null,
      };

      const { error } = await db.from('dosare').update(updates).eq('id', openDosarId);

      if (error) {
        indicator.textContent = '✗ ' + error.message;
      } else {
        const idx = allDosare.findIndex(d => d.id === openDosarId);
        if (idx !== -1) allDosare[idx] = { ...allDosare[idx], ...updates };
        updateStats(allDosare);
        filterByStatus(activeFilter);
        indicator.textContent = L('saved');
        indicator.className = 'save-indicator saved';
      }
    }

    // ── CRUD ─────────────────────────────────────────────────────────────
    function formatDate(iso) {
      const lang = localStorage.getItem('lang') || 'ro';
      return new Date(iso).toLocaleDateString(lang==='en'?'en-GB':'ro-RO', {day:'numeric', month:'short', year:'numeric'});
    }

    async function updateStatus(id, status) {
      await db.from('dosare').update({ status }).eq('id', id);
      const d = allDosare.find(x => x.id === id);
      if (d) {
        d.status = status;
        updateStats(allDosare);
        if (status !== 'lead') sendEmail({ type:'status_update', to:d.client_email, client_name:d.client_name, service_type:d.service_type, status });
      }
    }

    async function updateNotes(id, notes) {
      await db.from('dosare').update({ notes }).eq('id', id);
      const d = allDosare.find(x => x.id === id);
      if (d) d.notes = notes;
    }

    async function deleteDosar(id) {
      if (!confirm(L('confirm_delete'))) return;
      await db.from('dosare').delete().eq('id', id);
      allDosare = allDosare.filter(d => d.id !== id);
      updateStats(allDosare);
      filterByStatus(activeFilter);
      if (openDosarId === id) closeDrawer();
    }

    async function loadDosare() {
      const { data, error } = await db.from('dosare').select('*').order('created_at', { ascending: false });
      if (error) {
        document.getElementById('table-container').innerHTML = `<div class="loading" style="color:#e53e3e">Eroare: ${error.message}</div>`;
        return;
      }
      allDosare = data || [];
      updateStats(allDosare);
      renderPipelineTabs();
      filterByStatus(activeFilter);
    }

    async function sendEmail(payload) {
      try {
        await fetch('/.netlify/functions/send-email', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      } catch (e) { console.warn('Email failed:', e); }
    }

    // ── MODAL: Dosar nou ──────────────────────────────────────────────────
    document.getElementById('new-dosar-btn').onclick = () => document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); };

    document.getElementById('modal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('modal-submit');
      btn.textContent = L('loading_create');
      btn.disabled = true;

      const payload = {
        client_name:   document.getElementById('f-name').value.trim(),
        client_email:  document.getElementById('f-email').value.trim().toLowerCase(),
        phone:         document.getElementById('f-phone').value.trim() || null,
        cui:           document.getElementById('f-cui').value.trim() || null,
        service_type:  document.getElementById('f-service').value,
        risk_level:    document.getElementById('f-risk').value,
        procedure_rec: document.getElementById('f-procedure').value.trim() || null,
        notes:         document.getElementById('f-notes').value.trim() || null,
        status:        'lead',
      };

      const { error } = await db.from('dosare').insert(payload);
      btn.textContent = L('btn_create');
      btn.disabled = false;

      if (error) {
        alert('Eroare: ' + error.message);
      } else {
        sendEmail({ type:'welcome', to:payload.client_email, client_name:payload.client_name, service_type:payload.service_type });
        document.getElementById('modal-overlay').classList.remove('open');
        document.getElementById('modal-form').reset();
        await loadDosare();
      }
    });

    // ── DRAWER events ────────────────────────────────────────────────────
    document.getElementById('drawer-close').onclick = closeDrawer;
    document.getElementById('drawer-overlay').onclick = closeDrawer;
    document.getElementById('drawer-save').onclick = saveDrawer;

    // ── INIT ─────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      if (profile?.role !== 'admin') { window.location.href = 'dashboard.html'; return; }
      await loadDosare();
    }

    document.getElementById('logout-btn').onclick = async () => { await db.auth.signOut(); window.location.href = 'login.html'; };

    init();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
