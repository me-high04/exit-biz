<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mulțumim! — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg);
    }
    .thankyou-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07);
    }
    .thankyou-icon {
      width: 64px;
      height: 64px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .thankyou-icon svg {
      width: 32px;
      height: 32px;
      color: var(--green);
    }
    .thankyou-card h1 {
      font-size: 26px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .thankyou-card p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .thankyou-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .thankyou-meta {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="thankyou-page">
    <div class="thankyou-card">

      <div class="thankyou-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1>Cererea ta a fost trimisă!</h1>
      <p>Îți mulțumim pentru mesaj. Te vom contacta în mai puțin de <strong>24 de ore</strong> cu toate detaliile necesare.</p>

      <div class="thankyou-actions">
        <a href="/" class="btn-primary btn-large">← Înapoi pe pagina principală</a>
        <a href="https://wa.me/40772129941" target="_blank" rel="noopener" class="btn-ghost btn-large">Scrie-ne direct pe WhatsApp</a>
      </div>

      <div class="thankyou-meta">
        Echipa ExitBiz · <a href="/" style="color:var(--green)">exitbiz.netlify.app</a>
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
