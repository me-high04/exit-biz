<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #F8FAFC; }

    /* Nav */
    .db-nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .db-nav-right { display: flex; align-items: center; gap: 1rem; }
    .db-user-email { font-size: 13px; color: var(--text-secondary); }

    /* Layout */
    .db-main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* Greeting */
    .db-greeting { margin-bottom: 2rem; }
    .db-greeting h1 { font-size: 26px; font-weight: 300; color: var(--text-primary); margin-bottom: 4px; }
    .db-greeting p { font-size: 14px; color: var(--text-secondary); }

    /* Card base */
    .db-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }
    .db-card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    /* Dosar header */
    .dosar-firm-name { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .dosar-service-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--green-light);
      color: var(--green);
      margin-bottom: 4px;
    }
    .dosar-cui { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Progress */
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .progress-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .progress-counter { font-size: 13px; color: var(--text-secondary); }
    .progress-bar-track {
      height: 8px;
      background: #E2E8F0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width .5s ease;
    }
    .current-step-box {
      background: #F0F7FF;
      border: 1px solid #BFDBFE;
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .current-step-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--green); margin-bottom: 4px; }
    .current-step-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .current-step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* Steps mini list */
    .steps-mini { display: flex; flex-direction: column; gap: 6px; margin-top: 1.25rem; }
    .step-mini-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 0;
    }
    .step-mini-item.done { color: var(--text-primary); }
    .step-mini-item.active { color: var(--green); font-weight: 500; }
    .step-mini-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #CBD5E1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    .step-mini-item.done .step-mini-dot { background: var(--green); border-color: var(--green); color: #fff; }
    .step-mini-item.active .step-mini-dot { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 700; }

    .steps-show-more {
      font-size: 13px;
      color: var(--green);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
      font-weight: 500;
    }

    /* Documents needed — per-doc upload */
    .docs-needed-list { display: flex; flex-direction: column; gap: 12px; margin-top: 0.5rem; }
    .doc-needed-item {
      border: 1px solid #FDE68A;
      border-radius: 10px;
      background: #FFFBEB;
      overflow: hidden;
    }
    .doc-needed-item.uploaded {
      border-color: #86EFAC;
      background: #F0FDF4;
    }
    .doc-needed-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }
    .doc-needed-icon { font-size: 16px; flex-shrink: 0; }
    .doc-needed-name { font-size: 13px; font-weight: 500; color: #92400E; flex: 1; }
    .doc-needed-item.uploaded .doc-needed-name { color: #166534; }
    .doc-needed-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      background: #BBF7D0;
      color: #166534;
      white-space: nowrap;
    }
    .doc-needed-upload {
      border-top: 1px solid #FDE68A;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .doc-needed-item.uploaded .doc-needed-upload { display: none; }
    .doc-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border: 1.5px dashed #F59E0B;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #92400E;
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .doc-upload-label:hover { border-color: #D97706; background: #FEF3C7; }
    .doc-upload-label input { display: none; }
    .doc-selected-name { font-size: 12px; color: var(--text-secondary); }
    .doc-upload-btn {
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }
    .doc-upload-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* General doc upload (non-needed) */
    .doc-upload-area { margin-top: 1rem; }
    .doc-upload-area .doc-upload-label {
      border-color: var(--border);
      color: var(--text-secondary);
    }
    .doc-upload-area .doc-upload-label:hover { border-color: var(--green); color: var(--green); background: transparent; }

    /* Doc list */
    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #F8FAFC;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .doc-item-left { display: flex; align-items: center; gap: 9px; }
    .doc-item-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .doc-item-date { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .doc-download-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-light);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .doc-empty { font-size: 13px; color: var(--text-secondary); font-style: italic; padding: 4px 0; }

    /* Note */
    .note-box {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 14px;
      color: #78350F;
      line-height: 1.6;
    }
    .note-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #B45309; margin-bottom: 6px; }

    /* Empty & loading */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state h2 { font-size: 20px; font-weight: 400; color: var(--text-primary); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 15px; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .loading-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); font-size: 15px; }

    /* Divider */
    .db-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    @media (max-width: 600px) {
      .db-main { padding: 1.5rem 1rem 3rem; }
      .db-nav { padding: 0 1rem; }
    }

    /* ── Account Drawer ─────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.35);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .account-drawer {
      position: fixed; top: 0; right: 0; width: 340px; max-width: 100vw;
      height: 100%; background: #fff; border-left: 1px solid var(--border);
      z-index: 201; transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .account-drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .drawer-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .drawer-close {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
      background: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: var(--text-secondary); font-size: 16px; transition: background .15s;
    }
    .drawer-close:hover { background: #F8FAFC; }

    .drawer-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; flex: 1; }

    .drawer-avatar-section { display: flex; align-items: center; gap: 1rem; padding-bottom: 0.25rem; }
    .drawer-avatar {
      width: 52px; height: 52px; border-radius: 50%; background: var(--green); color: #fff;
      font-size: 18px; font-weight: 600; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; letter-spacing: 1px;
    }
    .drawer-user-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .drawer-user-email { font-size: 13px; color: var(--text-secondary); margin-top: 2px; word-break: break-all; }

    .drawer-section { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .drawer-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
      color: var(--text-secondary); padding: 10px 14px; background: #F8FAFC;
      border-bottom: 1px solid var(--border);
    }
    .drawer-section-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    .drawer-field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .drawer-field input {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; background: #fff; color: var(--text-primary);
      transition: border-color .15s; box-sizing: border-box;
    }
    .drawer-field input:focus { outline: none; border-color: var(--green); }
    .drawer-field input[readonly] { background: #F8FAFC; color: var(--text-secondary); cursor: default; }

    .drawer-btn {
      padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; border: none; transition: all .15s;
    }
    .drawer-btn-primary { background: var(--green); color: #fff; }
    .drawer-btn-primary:hover { opacity: .9; }
    .drawer-btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .drawer-btn-ghost { background: #fff; color: var(--text-primary); border: 1px solid var(--border) !important; }
    .drawer-btn-ghost:hover { border-color: #aaa !important; background: #F8FAFC; }
    .drawer-btn-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA !important; width: 100%; }
    .drawer-btn-danger:hover { background: #FEE2E2; }

    .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .lang-toggle button {
      flex: 1; padding: 9px; border: none; background: none; font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: all .15s;
    }
    .lang-toggle button.active { background: var(--green); color: #fff; }

    .plan-card {
      background: linear-gradient(135deg,#EFF6FF 0%,#F0F7FF 100%);
      border: 1px solid #BFDBFE; border-radius: 10px; padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .plan-name { font-size: 14px; font-weight: 600; color: var(--green); }
    .plan-status { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .plan-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; background: var(--green); color: #fff; }

    .drawer-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: #fff; }
    .drawer-logout {
      width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px;
      background: none; font-family: inherit; font-size: 14px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all .15s;
    }
    .drawer-logout:hover { border-color: #aaa; color: var(--text-primary); background: #F8FAFC; }

    .nav-avatar-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--green); color: #fff;
      font-size: 13px; font-weight: 600; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; flex-shrink: 0; letter-spacing: 1px;
    }
    .nav-avatar-btn:hover { opacity: .85; }

    .drawer-msg { font-size: 12px; padding: 8px 12px; border-radius: 8px; display: none; }
    .drawer-msg.show { display: block; }
    .drawer-msg.ok { background: #F0FDF4; color: #166534; border: 1px solid #86EFAC; }
    .drawer-msg.err { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
  </style>
</head>
<body>

  <nav class="db-nav">
    <a href="/" class="logo">exit<span>biz</span></a>
    <div class="db-nav-right">
      <button class="nav-avatar-btn" id="nav-avatar" onclick="openDrawer()">?</button>
    </div>
  </nav>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

  <!-- Account drawer -->
  <div class="account-drawer" id="account-drawer">
    <div class="drawer-header">
      <span class="drawer-title">Contul meu</span>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>

    <div class="drawer-body">
      <!-- Avatar + info -->
      <div class="drawer-avatar-section">
        <div class="drawer-avatar" id="drawer-avatar">?</div>
        <div>
          <div class="drawer-user-name" id="drawer-name-display">—</div>
          <div class="drawer-user-email" id="drawer-email-display">—</div>
        </div>
      </div>

      <!-- Profil -->
      <div class="drawer-section">
        <div class="drawer-section-title">Profil</div>
        <div class="drawer-section-body">

            <label>Nume complet</label>

          </div>
          <div class="drawer-field">
            <label>Email</label>

          <div class="drawer-msg" id="profile-msg"></div>
          <button class="drawer-btn drawer-btn-primary" onclick="saveProfile()">Salvează modificările</button>
        </div>
      </div>

      <!-- Schimbă parola -->
      <div class="drawer-section">
        <div class="drawer-section-title">Schimbă parola</div>

          <div class="drawer-field">
            <label>Parolă nouă</label>
            <input type="password" id="drawer-pw1" placeholder="Minim 6 caractere" />
          </div>
          <div class="drawer-field">
            <label>Confirmă parola</label>
            <input type="password" id="drawer-pw2" placeholder="Repetă parola" />
          </div>
          <div class="drawer-msg" id="pw-msg"></div>
          <button class="drawer-btn drawer-btn-primary" onclick="changePassword()">Actualizează parola</button>
        </div>
      </div>

      <!-- Limbă -->
      <div class="drawer-section">
        <div class="drawer-section-title">Limbă / Language</div>
        <div class="drawer-section-body">
          <div class="lang-toggle">
            <button id="lang-ro-btn" onclick="setLang('ro')">🇷🇴 Română</button>
            <button id="lang-en-btn" onclick="setLang('en')">🇬🇧 English</button>
          </div>
        </div>
      </div>

      <!-- Abonament -->
      <div class="drawer-section">
        <div class="drawer-section-title">Abonament</div>
        <div class="drawer-section-body">
          <div class="plan-card">
            <div>
              <div class="plan-name">Plan Standard</div>
              <div class="plan-status">Activ · ExitBiz</div>
            </div>
            <span class="plan-badge">Activ</span>
          </div>
          <button class="drawer-btn drawer-btn-ghost" onclick="window.open('https://wa.me/40772129941','_blank')">
            Gestionează abonamentul →
          </button>
        </div>
      </div>

      <!-- Zonă periculoasă -->
      <div class="drawer-section">
        <div class="drawer-section-title" style="color:#DC2626;background:#FEF2F2;border-bottom-color:#FECACA;">Zonă periculoasă</div>
        <div class="drawer-section-body">
          <p style="font-size:13px;color:var(--text-secondary);margin:0;">Ștergerea contului este permanentă și nu poate fi anulată.</p>
          <div class="drawer-msg" id="delete-msg"></div>
          <button class="drawer-btn drawer-btn-danger" onclick="confirmDeleteAccount()">Șterge contul</button>
        </div>
      </div>
    </div>

    <div class="drawer-footer">
      <button class="drawer-logout" onclick="doLogout()">← Ieși din cont</button>
    </div>
  </div>

  <div class="db-main">
    <div class="db-greeting">
      <h1>Bună, <span id="greeting-name">—</span></h1>
      <p>Urmărește statusul dosarului tău în timp real.</p>
    </div>
    <div id="dosare-container">
      <div class="loading-state">Se încarcă dosarul...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const SVC_LABELS = {
      inchidere_voluntara: 'Închidere voluntară',
      inchidere_cu_administrator: 'Închidere cu administrator',
      inchidere_cu_vanzare: 'Închidere cu vânzare',
      exit_cesiune: 'Exit cesiune',
      altul: 'Alt serviciu'
    };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    function formatDateShort(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short' });
    }

    // Render steps: show done + current + next 2, with toggle for all
    function renderSteps(steps, currentStep, dosarId) {
      if (!steps || !steps.length) return '';
      const total = steps.length;
      const windowSteps = [];
      for (let i = 0; i < total; i++) {
        const stepNum = i + 1;
        const isDone = stepNum < currentStep;
        const isActive = stepNum === currentStep;
        const show = isDone || isActive || stepNum === currentStep + 1 || stepNum === currentStep + 2;
        windowSteps.push({ ...steps[i], num: stepNum, isDone, isActive, show });
      }

      const visibleItems = windowSteps.filter(s => s.show);
      const hiddenCount = total - visibleItems.length;

      const itemsHtml = windowSteps.map(s => {
        if (!s.show) return `<div class="step-mini-item" data-step-extra style="display:none;">
          <div class="step-mini-dot">${s.isDone ? '✓' : s.num}</div>
          <span>${s.num}. ${s.name}</span>
        </div>`;
        let cls = s.isDone ? 'done' : s.isActive ? 'active' : '';
        let icon = s.isDone ? '✓' : s.num;
        return `<div class="step-mini-item ${cls}">
          <div class="step-mini-dot">${icon}</div>
          <span>${s.num}. ${s.name}</span>
        </div>`;
      }).join('');

      const toggleBtn = hiddenCount > 0 ? `<button class="steps-show-more" onclick="toggleAllSteps('${dosarId}')">
        + Vezi toți cei ${total} pași
      </button>` : '';

      return `<div class="steps-mini" id="steps-list-${dosarId}">${itemsHtml}</div>${toggleBtn}`;
    }

    function toggleAllSteps(dosarId) {
      const list = document.getElementById(`steps-list-${dosarId}`);
      if (!list) return;
      const hidden = list.querySelectorAll('[data-step-extra]');
      const btn = list.nextElementSibling;
      const isHidden = hidden[0]?.style.display === 'none';
      hidden.forEach(el => el.style.display = isHidden ? 'flex' : 'none');
      if (btn) btn.textContent = isHidden ? '− Restrânge pașii' : `+ Vezi toți pașii`;
    }

    function renderDocsNeeded(steps, currentStep, clientDocs, dosarId) {
      if (!steps || !steps.length) return '';
      const step = steps[currentStep - 1];
      if (!step || !step.docs || !step.docs.length) return '';

      const items = step.docs.map((docName, idx) => {
        const slotId = `needed-${dosarId}-${idx}`;
        // Check if already uploaded: match by name and step_number
        const isUploaded = (clientDocs || []).some(d =>
          d.step_number === currentStep && d.name === docName
        );
        return `<div class="doc-needed-item ${isUploaded ? 'uploaded' : ''}" id="slot-${slotId}">
          <div class="doc-needed-header">
            <span class="doc-needed-icon">${isUploaded ? '✅' : '📋'}</span>
            <span class="doc-needed-name">${docName}</span>
            ${isUploaded ? '<span class="doc-needed-badge">Încărcat ✓</span>' : ''}
          </div>
          <div class="doc-needed-upload">
            <label class="doc-upload-label">
              <input type="file" id="file-${slotId}" onchange="onNeededFileSelected('${slotId}')" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
              + Alege fișier
            </label>
            <span class="doc-selected-name" id="fname-${slotId}"></span>
            <button class="doc-upload-btn" id="ubtn-${slotId}"
              onclick="uploadNeededDoc('${dosarId}', '${docName.replace(/'/g,"\\'")}', ${currentStep}, '${slotId}')">
              Trimite
            </button>
          </div>
        </div>`;
      }).join('');

      return `
        <div class="db-card">
          <div class="db-card-title">Documente necesare la pasul curent</div>
          <div class="docs-needed-list">${items}</div>
        </div>`;
    }

    function renderDocs(cabinetDocs, clientDocs, dosarId) {
      const cabinetHtml = cabinetDocs.length
        ? cabinetDocs.map(d => `<div class="doc-item">
            <div class="doc-item-left">
              <span style="font-size:18px;">📄</span>
              <div>
                <div class="doc-item-name">${d.name}</div>
                <div class="doc-item-date">${formatDateShort(d.created_at)}</div>
              </div>
            </div>
            <button class="doc-download-btn" onclick="downloadDoc('${d.path}','${d.name}')">Descarcă</button>
          </div>`).join('')
        : `<div class="doc-empty">Niciun document de la cabinet momentan.</div>`;

      const clientHtml = clientDocs.length
        ? clientDocs.map(d => `<div class="doc-item">
            <div class="doc-item-left">
              <span style="font-size:18px;">✅</span>
              <div>
                <div class="doc-item-name">${d.name}</div>
                <div class="doc-item-date">${formatDateShort(d.created_at)}</div>
              </div>
            </div>
          </div>`).join('')
        : `<div class="doc-empty">Nu ai trimis documente încă.</div>`;

      return `
        <div class="db-card">
          <div class="db-card-title">Documente de la cabinet</div>
          <div class="doc-list">${cabinetHtml}</div>
          <hr class="db-divider" />
          <div class="db-card-title">Documente trimise de tine</div>
          <div class="doc-list">${clientHtml}</div>
          <div class="doc-upload-area">
            <label class="doc-upload-label">
              <input type="file" id="file-input-${dosarId}" onchange="onFileSelected('${dosarId}')" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
              + Încarcă document
            </label>
            <div class="doc-selected-name" id="file-name-${dosarId}"></div>
            <button class="doc-upload-btn" id="upload-btn-${dosarId}" onclick="uploadDoc('${dosarId}')">Trimite documentul</button>
          </div>
        </div>`;
    }

    function renderDosar(d, docs) {
      const steps = d.steps || [];
      const currentStep = d.current_step || 1;
      const total = steps.length || 20;
      const pct = Math.round(((currentStep - 1) / total) * 100);
      const currentStepData = steps[currentStep - 1] || { name: `Pasul ${currentStep}`, desc: '' };
      const svcLabel = SVC_LABELS[d.service_type] || d.service_type || 'Serviciu';
      const customSvc = d.service_custom ? ` — ${d.service_custom}` : '';
      const cui = d.cui ? `CUI: RO${d.cui}` : '';

      const cabinetDocs = (docs || []).filter(doc => doc.uploaded_by === 'cabinet');
      const clientDocs  = (docs || []).filter(doc => doc.uploaded_by === 'client');

      const noteHtml = d.notes ? `
        <div class="db-card">
          <div class="note-box-label">Notă de la echipa ExitBiz</div>
          <div class="note-box">${d.notes}</div>
        </div>` : '';

      return `
        <!-- Dosar header -->
        <div class="db-card">
          <div class="dosar-firm-name">${d.client_name || '—'}</div>
          <div class="dosar-service-badge">${svcLabel}${customSvc}</div>
          ${cui ? `<div class="dosar-cui">${cui}</div>` : ''}
        </div>

        <!-- Progress -->
        <div class="db-card">
          <div class="db-card-title">Progres dosar</div>
          <div class="progress-header">
            <span class="progress-label">${pct}% completat</span>
            <span class="progress-counter">Pasul ${currentStep} din ${total}</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="current-step-box">
            <div class="current-step-label">Pasul curent</div>
            <div class="current-step-name">${currentStep}. ${currentStepData.name}</div>
            ${currentStepData.desc ? `<div class="current-step-desc">${currentStepData.desc}</div>` : ''}
          </div>
          ${renderSteps(steps, currentStep, d.id)}
        </div>

        <!-- Docs needed -->
        ${renderDocsNeeded(steps, currentStep, clientDocs, d.id)}

        <!-- All documents -->
        ${renderDocs(cabinetDocs, clientDocs, d.id)}

        <!-- Note -->
        ${noteHtml}`;
    }

    // Upload pentru un document necesar specific (cu step_number)
    function onNeededFileSelected(slotId) {
      const input = document.getElementById(`file-${slotId}`);
      const nameEl = document.getElementById(`fname-${slotId}`);
      const btn = document.getElementById(`ubtn-${slotId}`);
      if (input?.files[0]) {
        nameEl.textContent = input.files[0].name;
        btn.style.display = 'inline-block';
      }
    }

    async function uploadNeededDoc(dosarId, docName, stepNum, slotId) {
      const input = document.getElementById(`file-${slotId}`);
      const btn = document.getElementById(`ubtn-${slotId}`);
      const file = input?.files[0];
      if (!file) return;
      btn.disabled = true;
      btn.textContent = 'Se trimite...';
      const path = `${dosarId}/step${stepNum}_${Date.now()}_${file.name}`;
      const { error } = await db.storage.from('documente').upload(path, file);
      if (error) { alert('Eroare upload: ' + error.message); btn.disabled = false; btn.textContent = 'Trimite'; return; }
      await db.from('documente').insert({
        dosar_id: dosarId,
        name: docName,
        path,
        size: file.size,
        uploaded_by: 'client',
        step_number: stepNum
      });
      await loadPage();
    }

    // Upload general (din secțiunea "Documente trimise de tine")
    function onFileSelected(dosarId) {
      const input = document.getElementById(`file-input-${dosarId}`);
      const nameEl = document.getElementById(`file-name-${dosarId}`);
      const btn = document.getElementById(`upload-btn-${dosarId}`);
      if (input?.files[0]) {
        nameEl.textContent = input.files[0].name;
        btn.style.display = 'inline-block';
      }
    }

    async function uploadDoc(dosarId) {
      const input = document.getElementById(`file-input-${dosarId}`);
      const btn = document.getElementById(`upload-btn-${dosarId}`);
      const file = input?.files[0];
      if (!file) return;
      btn.disabled = true;
      btn.textContent = 'Se trimite...';
      const path = `${dosarId}/${Date.now()}_${file.name}`;
      const { error } = await db.storage.from('documente').upload(path, file);
      if (error) { alert('Eroare upload: ' + error.message); btn.disabled = false; btn.textContent = 'Trimite documentul'; return; }
      await db.from('documente').insert({ dosar_id: dosarId, name: file.name, path, size: file.size, uploaded_by: 'client' });
      await loadPage();
    }

    async function downloadDoc(path, name) {
      const { data, error } = await db.storage.from('documente').createSignedUrl(path, 60);
      if (error || !data?.signedUrl) { alert('Eroare la descărcare.'); return; }
      const a = document.createElement('a');
      a.href = data.signedUrl;
      a.download = name;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function loadPage() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const user = session.user;
      currentUser = user;

      const { data: profile } = await db.from('profiles').select('full_name, role').eq('id', user.id).single();
      if (profile?.role === 'admin') { window.location.href = 'admin.html'; return; }

      const name = profile?.full_name || user.email.split('@')[0];
      document.getElementById('greeting-name').textContent = name;

      // Init drawer
      setInitials(name);
      document.getElementById('drawer-name-display').textContent = name;
      document.getElementById('drawer-email-display').textContent = user.email;
      document.getElementById('drawer-name-input').value = name;
      document.getElementById('drawer-email-input').value = user.email;
      initLang();

      const { data: dosare, error } = await db
        .from('dosare')
        .select('*')
        .or(`client_email.eq.${user.email},clienti_extra.cs.${JSON.stringify([{ email: user.email }])}`)
        .order('created_at', { ascending: false });

      const container = document.getElementById('dosare-container');

      if (error || !dosare?.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div style="font-size:48px;margin-bottom:1rem;">📋</div>
            <h2>Niciun dosar activ momentan</h2>
            <p>Dosarul tău va apărea aici imediat ce echipa ExitBiz îl creează.</p>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
              <a href="/" class="btn-primary">Trimite o cerere →</a>
              <a href="https://wa.me/40772129941" target="_blank" class="btn-ghost">Scrie-ne pe WhatsApp</a>
            </div>
          </div>`;
        return;
      }

      // Load docs for all dosare
      const dosar = dosare[0]; // show primary dosar
      currentDosarId = dosar.id;

      const { data: docs } = await db
        .from('documente')
        .select('*')
        .eq('dosar_id', dosar.id)
        .order('created_at', { ascending: false });

      container.innerHTML = renderDosar(dosar, docs || []);

      // Realtime updates
      db.channel(`dosar-${dosar.id}`)
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'dosare',
          filter: `id=eq.${dosar.id}`
        }, () => loadPage())
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'documente',
          filter: `dosar_id=eq.${dosar.id}`
        }, () => loadPage())
        .subscribe();
    }

    /* ── Drawer ──────────────────────────────────── */
    let currentUser = null;
    let _deleteConfirmed = false;

    function openDrawer() {
      document.getElementById('account-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('account-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function setInitials(name) {
      const parts = name.trim().split(/\s+/);
      const ini = parts.length >= 2
        ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
        : name.slice(0, 2).toUpperCase();
      document.getElementById('nav-avatar').textContent = ini;
      document.getElementById('drawer-avatar').textContent = ini;
    }

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('lang-ro-btn').classList.toggle('active', lang === 'ro');
      document.getElementById('lang-en-btn').classList.toggle('active', lang === 'en');
    }
    function initLang() { setLang(localStorage.getItem('lang') || 'ro'); }

    function showDrawerMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `drawer-msg show ${type}`;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    async function saveProfile() {
      const name = document.getElementById('drawer-name-input').value.trim();
      if (!name) { showDrawerMsg('profile-msg', 'Introduceți un nume.', 'err'); return; }
      const { error } = await db.from('profiles').update({ full_name: name }).eq('id', currentUser.id);
      if (error) { showDrawerMsg('profile-msg', 'Eroare la salvare.', 'err'); return; }
      document.getElementById('drawer-name-display').textContent = name;
      document.getElementById('greeting-name').textContent = name;
      setInitials(name);
      showDrawerMsg('profile-msg', 'Profil actualizat!', 'ok');
    }

    async function changePassword() {
      const pw1 = document.getElementById('drawer-pw1').value;
      const pw2 = document.getElementById('drawer-pw2').value;
      if (!pw1 || pw1.length < 6) { showDrawerMsg('pw-msg', 'Parola trebuie să aibă minim 6 caractere.', 'err'); return; }
      if (pw1 !== pw2) { showDrawerMsg('pw-msg', 'Parolele nu coincid.', 'err'); return; }
      const { error } = await db.auth.updateUser({ password: pw1 });
      if (error) { showDrawerMsg('pw-msg', 'Eroare la schimbarea parolei.', 'err'); return; }
      document.getElementById('drawer-pw1').value = '';
      document.getElementById('drawer-pw2').value = '';
      showDrawerMsg('pw-msg', 'Parola a fost schimbată!', 'ok');
    }

    async function confirmDeleteAccount() {
      if (!_deleteConfirmed) {
        _deleteConfirmed = true;
        showDrawerMsg('delete-msg', 'Apasă din nou pentru a confirma ștergerea permanentă.', 'err');
        setTimeout(() => { _deleteConfirmed = false; }, 5000);
        return;
      }
      const { data: { session } } = await db.auth.getSession();
      const res = await fetch('/.netlify/functions/delete-account', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${session.access_token}` }
      });
      if (!res.ok) { showDrawerMsg('delete-msg', 'Eroare. Contactați suportul la contact@exitbiz.ro.', 'err'); return; }
      await db.auth.signOut();
      window.location.href = 'login.html';
    }

    async function doLogout() {
      await db.auth.signOut();
      window.location.href = 'login.html';
    }

    loadPage();
  </script>
</body>
</html>
