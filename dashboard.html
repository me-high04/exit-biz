<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #F8FAFC; }

    /* Nav */
    .db-nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .db-nav-right { display: flex; align-items: center; gap: 1rem; }
    .db-user-email { font-size: 13px; color: var(--text-secondary); }

    /* Layout */
    .db-main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* Greeting */
    .db-greeting { margin-bottom: 2rem; }
    .db-greeting h1 { font-size: 26px; font-weight: 300; color: var(--text-primary); margin-bottom: 4px; }
    .db-greeting p { font-size: 14px; color: var(--text-secondary); }

    /* Card base */
    .db-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }
    .db-card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    /* Dosar header */
    .dosar-firm-name { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .dosar-service-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--green-light);
      color: var(--green);
      margin-bottom: 4px;
    }
    .dosar-cui { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Progress */
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .progress-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .progress-counter { font-size: 13px; color: var(--text-secondary); }
    .progress-bar-track {
      height: 8px;
      background: #E2E8F0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width .5s ease;
    }
    .current-step-box {
      background: #F0F7FF;
      border: 1px solid #BFDBFE;
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .current-step-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--green); margin-bottom: 4px; }
    .current-step-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .current-step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* Steps mini list */
    .steps-mini { display: flex; flex-direction: column; gap: 6px; margin-top: 1.25rem; }
    .step-mini-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 0;
    }
    .step-mini-item.done { color: var(--text-primary); }
    .step-mini-item.active { color: var(--green); font-weight: 500; }
    .step-mini-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #CBD5E1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    .step-mini-item.done .step-mini-dot { background: var(--green); border-color: var(--green); color: #fff; }
    .step-mini-item.active .step-mini-dot { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 700; }

    .steps-show-more {
      font-size: 13px;
      color: var(--green);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
      font-weight: 500;
    }

    /* Documents needed — per-doc upload */
    .docs-needed-list { display: flex; flex-direction: column; gap: 12px; margin-top: 0.5rem; }
    .doc-needed-item {
      border: 1px solid #FDE68A;
      border-radius: 10px;
      background: #FFFBEB;
      overflow: hidden;
    }
    .doc-needed-item.uploaded {
      border-color: #86EFAC;
      background: #F0FDF4;
    }
    .doc-needed-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }
    .doc-needed-icon { font-size: 16px; flex-shrink: 0; }
    .doc-needed-name { font-size: 13px; font-weight: 500; color: #92400E; flex: 1; }
    .doc-needed-item.uploaded .doc-needed-name { color: #166534; }
    .doc-needed-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      background: #BBF7D0;
      color: #166534;
      white-space: nowrap;
    }
    .doc-needed-upload {
      border-top: 1px solid #FDE68A;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .doc-needed-item.uploaded .doc-needed-upload { display: none; }
    .doc-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border: 1.5px dashed #F59E0B;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #92400E;
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .doc-upload-label:hover { border-color: #D97706; background: #FEF3C7; }
    .doc-upload-label input { display: none; }
    .doc-selected-name { font-size: 12px; color: var(--text-secondary); }
    .doc-upload-btn {
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }
    .doc-upload-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* General doc upload (non-needed) */
    .doc-upload-area { margin-top: 1rem; }
    .doc-upload-area .doc-upload-label {
      border-color: var(--border);
      color: var(--text-secondary);
    }
    .doc-upload-area .doc-upload-label:hover { border-color: var(--green); color: var(--green); background: transparent; }

    /* Doc list */
    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #F8FAFC;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .doc-item-left { display: flex; align-items: center; gap: 9px; }
    .doc-item-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .doc-item-date { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .doc-download-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-light);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .doc-empty { font-size: 13px; color: var(--text-secondary); font-style: italic; padding: 4px 0; }

    /* Note */
    .note-box {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 14px;
      color: #78350F;
      line-height: 1.6;
    }
    .note-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #B45309; margin-bottom: 6px; }

    /* Empty & loading */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state h2 { font-size: 20px; font-weight: 400; color: var(--text-primary); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 15px; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .loading-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); font-size: 15px; }

    /* Divider */
    .db-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    @media (max-width: 600px) {
      .db-main { padding: 1.5rem 1rem 3rem; }
      .db-nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <nav class="db-nav">
    <a href="/" class="logo">exit<span>biz</span></a>
    <div class="db-nav-right">
      <span class="db-user-email" id="user-email-display"></span>
      <button class="btn-ghost" style="font-size:13px;padding:7px 14px;" id="logout-btn">Ieși din cont</button>
    </div>
  </nav>

  <div class="db-main">
    <div class="db-greeting">
      <h1>Bună, <span id="greeting-name">—</span></h1>
      <p>Urmărește statusul dosarului tău în timp real.</p>
    </div>
    <div id="dosare-container">
      <div class="loading-state">Se încarcă dosarul...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const SVC_LABELS = {
      inchidere_voluntara: 'Închidere voluntară',
      inchidere_cu_administrator: 'Închidere cu administrator',
      inchidere_cu_vanzare: 'Închidere cu vânzare',
      exit_cesiune: 'Exit cesiune',
      altul: 'Alt serviciu'
    };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    function formatDateShort(iso) {
      return new Date(iso).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short' });
    }

    // Render steps: show done + current + next 2, with toggle for all
    function renderSteps(steps, currentStep, dosarId) {
      if (!steps || !steps.length) return '';
      const total = steps.length;
      const windowSteps = [];
      for (let i = 0; i < total; i++) {
        const stepNum = i + 1;
        const isDone = stepNum < currentStep;
        const isActive = stepNum === currentStep;
        const show = isDone || isActive || stepNum === currentStep + 1 || stepNum === currentStep + 2;
        windowSteps.push({ ...steps[i], num: stepNum, isDone, isActive, show });
      }

      const visibleItems = windowSteps.filter(s => s.show);
      const hiddenCount = total - visibleItems.length;

      const itemsHtml = windowSteps.map(s => {
        if (!s.show) return `<div class="step-mini-item" data-step-extra style="display:none;">
          <div class="step-mini-dot">${s.isDone ? '✓' : s.num}</div>
          <span>${s.num}. ${s.name}</span>
        </div>`;
        let cls = s.isDone ? 'done' : s.isActive ? 'active' : '';
        let icon = s.isDone ? '✓' : s.num;
        return `<div class="step-mini-item ${cls}">
          <div class="step-mini-dot">${icon}</div>
          <span>${s.num}. ${s.name}</span>
        </div>`;
      }).join('');

      const toggleBtn = hiddenCount > 0 ? `<button class="steps-show-more" onclick="toggleAllSteps('${dosarId}')">
        + Vezi toți cei ${total} pași
      </button>` : '';

      return `<div class="steps-mini" id="steps-list-${dosarId}">${itemsHtml}</div>${toggleBtn}`;
    }

    function toggleAllSteps(dosarId) {
      const list = document.getElementById(`steps-list-${dosarId}`);
      if (!list) return;
      const hidden = list.querySelectorAll('[data-step-extra]');
      const btn = list.nextElementSibling;
      const isHidden = hidden[0]?.style.display === 'none';
      hidden.forEach(el => el.style.display = isHidden ? 'flex' : 'none');
      if (btn) btn.textContent = isHidden ? '− Restrânge pașii' : `+ Vezi toți pașii`;
    }

    function renderDocsNeeded(steps, currentStep, clientDocs, dosarId) {
      if (!steps || !steps.length) return '';
      const step = steps[currentStep - 1];
      if (!step || !step.docs || !step.docs.length) return '';

      const items = step.docs.map((docName, idx) => {
        const slotId = `needed-${dosarId}-${idx}`;
        // Check if already uploaded: match by name and step_number
        const isUploaded = (clientDocs || []).some(d =>
          d.step_number === currentStep && d.name === docName
        );
        return `<div class="doc-needed-item ${isUploaded ? 'uploaded' : ''}" id="slot-${slotId}">
          <div class="doc-needed-header">
            <span class="doc-needed-icon">${isUploaded ? '✅' : '📋'}</span>
            <span class="doc-needed-name">${docName}</span>
            ${isUploaded ? '<span class="doc-needed-badge">Încărcat ✓</span>' : ''}
          </div>
          <div class="doc-needed-upload">
            <label class="doc-upload-label">
              <input type="file" id="file-${slotId}" onchange="onNeededFileSelected('${slotId}')" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
              + Alege fișier
            </label>
            <span class="doc-selected-name" id="fname-${slotId}"></span>
            <button class="doc-upload-btn" id="ubtn-${slotId}"
              onclick="uploadNeededDoc('${dosarId}', '${docName.replace(/'/g,"\\'")}', ${currentStep}, '${slotId}')">
              Trimite
            </button>
          </div>
        </div>`;
      }).join('');

      return `
        <div class="db-card">
          <div class="db-card-title">Documente necesare la pasul curent</div>
          <div class="docs-needed-list">${items}</div>
        </div>`;
    }

    function renderDocs(cabinetDocs, clientDocs, dosarId) {
      const cabinetHtml = cabinetDocs.length
        ? cabinetDocs.map(d => `<div class="doc-item">
            <div class="doc-item-left">
              <span style="font-size:18px;">📄</span>
              <div>
                <div class="doc-item-name">${d.name}</div>
                <div class="doc-item-date">${formatDateShort(d.created_at)}</div>
              </div>
            </div>
            <button class="doc-download-btn" onclick="downloadDoc('${d.path}','${d.name}')">Descarcă</button>
          </div>`).join('')
        : `<div class="doc-empty">Niciun document de la cabinet momentan.</div>`;

      const clientHtml = clientDocs.length
        ? clientDocs.map(d => `<div class="doc-item">
            <div class="doc-item-left">
              <span style="font-size:18px;">✅</span>
              <div>
                <div class="doc-item-name">${d.name}</div>
                <div class="doc-item-date">${formatDateShort(d.created_at)}</div>
              </div>
            </div>
          </div>`).join('')
        : `<div class="doc-empty">Nu ai trimis documente încă.</div>`;

      return `
        <div class="db-card">
          <div class="db-card-title">Documente de la cabinet</div>
          <div class="doc-list">${cabinetHtml}</div>
          <hr class="db-divider" />
          <div class="db-card-title">Documente trimise de tine</div>
          <div class="doc-list">${clientHtml}</div>
          <div class="doc-upload-area">
            <label class="doc-upload-label">
              <input type="file" id="file-input-${dosarId}" onchange="onFileSelected('${dosarId}')" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
              + Încarcă document
            </label>
            <div class="doc-selected-name" id="file-name-${dosarId}"></div>
            <button class="doc-upload-btn" id="upload-btn-${dosarId}" onclick="uploadDoc('${dosarId}')">Trimite documentul</button>
          </div>
        </div>`;
    }

    function renderDosar(d, docs) {
      const steps = d.steps || [];
      const currentStep = d.current_step || 1;
      const total = steps.length || 20;
      const pct = Math.round(((currentStep - 1) / total) * 100);
      const currentStepData = steps[currentStep - 1] || { name: `Pasul ${currentStep}`, desc: '' };
      const svcLabel = SVC_LABELS[d.service_type] || d.service_type || 'Serviciu';
      const customSvc = d.service_custom ? ` — ${d.service_custom}` : '';
      const cui = d.cui ? `CUI: RO${d.cui}` : '';

      const cabinetDocs = (docs || []).filter(doc => doc.uploaded_by === 'cabinet');
      const clientDocs  = (docs || []).filter(doc => doc.uploaded_by === 'client');

      const noteHtml = d.notes ? `
        <div class="db-card">
          <div class="note-box-label">Notă de la echipa ExitBiz</div>
          <div class="note-box">${d.notes}</div>
        </div>` : '';

      return `
        <!-- Dosar header -->
        <div class="db-card">
          <div class="dosar-firm-name">${d.client_name || '—'}</div>
          <div class="dosar-service-badge">${svcLabel}${customSvc}</div>
          ${cui ? `<div class="dosar-cui">${cui}</div>` : ''}
        </div>

        <!-- Progress -->
        <div class="db-card">
          <div class="db-card-title">Progres dosar</div>
          <div class="progress-header">
            <span class="progress-label">${pct}% completat</span>
            <span class="progress-counter">Pasul ${currentStep} din ${total}</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="current-step-box">
            <div class="current-step-label">Pasul curent</div>
            <div class="current-step-name">${currentStep}. ${currentStepData.name}</div>
            ${currentStepData.desc ? `<div class="current-step-desc">${currentStepData.desc}</div>` : ''}
          </div>
          ${renderSteps(steps, currentStep, d.id)}
        </div>

        <!-- Docs needed -->
        ${renderDocsNeeded(steps, currentStep, clientDocs, d.id)}

        <!-- All documents -->
        ${renderDocs(cabinetDocs, clientDocs, d.id)}

        <!-- Note -->
        ${noteHtml}`;
    }

    // Upload pentru un document necesar specific (cu step_number)
    function onNeededFileSelected(slotId) {
      const input = document.getElementById(`file-${slotId}`);
      const nameEl = document.getElementById(`fname-${slotId}`);
      const btn = document.getElementById(`ubtn-${slotId}`);
      if (input?.files[0]) {
        nameEl.textContent = input.files[0].name;
        btn.style.display = 'inline-block';
      }
    }

    async function uploadNeededDoc(dosarId, docName, stepNum, slotId) {
      const input = document.getElementById(`file-${slotId}`);
      const btn = document.getElementById(`ubtn-${slotId}`);
      const file = input?.files[0];
      if (!file) return;
      btn.disabled = true;
      btn.textContent = 'Se trimite...';
      const path = `${dosarId}/step${stepNum}_${Date.now()}_${file.name}`;
      const { error } = await db.storage.from('documente').upload(path, file);
      if (error) { alert('Eroare upload: ' + error.message); btn.disabled = false; btn.textContent = 'Trimite'; return; }
      await db.from('documente').insert({
        dosar_id: dosarId,
        name: docName,
        path,
        size: file.size,
        uploaded_by: 'client',
        step_number: stepNum
      });
      await loadPage();
    }

    // Upload general (din secțiunea "Documente trimise de tine")
    function onFileSelected(dosarId) {
      const input = document.getElementById(`file-input-${dosarId}`);
      const nameEl = document.getElementById(`file-name-${dosarId}`);
      const btn = document.getElementById(`upload-btn-${dosarId}`);
      if (input?.files[0]) {
        nameEl.textContent = input.files[0].name;
        btn.style.display = 'inline-block';
      }
    }

    async function uploadDoc(dosarId) {
      const input = document.getElementById(`file-input-${dosarId}`);
      const btn = document.getElementById(`upload-btn-${dosarId}`);
      const file = input?.files[0];
      if (!file) return;
      btn.disabled = true;
      btn.textContent = 'Se trimite...';
      const path = `${dosarId}/${Date.now()}_${file.name}`;
      const { error } = await db.storage.from('documente').upload(path, file);
      if (error) { alert('Eroare upload: ' + error.message); btn.disabled = false; btn.textContent = 'Trimite documentul'; return; }
      await db.from('documente').insert({ dosar_id: dosarId, name: file.name, path, size: file.size, uploaded_by: 'client' });
      await loadPage();
    }

    async function downloadDoc(path, name) {
      const { data, error } = await db.storage.from('documente').createSignedUrl(path, 60);
      if (error || !data?.signedUrl) { alert('Eroare la descărcare.'); return; }
      const a = document.createElement('a');
      a.href = data.signedUrl;
      a.download = name;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function loadPage() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const user = session.user;
      document.getElementById('user-email-display').textContent = user.email;

      const { data: profile } = await db.from('profiles').select('full_name, role').eq('id', user.id).single();
      if (profile?.role === 'admin') { window.location.href = 'admin.html'; return; }

      const name = profile?.full_name || user.email.split('@')[0];
      document.getElementById('greeting-name').textContent = name;

      const { data: dosare, error } = await db
        .from('dosare')
        .select('*')
        .or(`client_email.eq.${user.email},clienti_extra.cs.${JSON.stringify([{ email: user.email }])}`)
        .order('created_at', { ascending: false });

      const container = document.getElementById('dosare-container');

      if (error || !dosare?.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div style="font-size:48px;margin-bottom:1rem;">📋</div>
            <h2>Niciun dosar activ momentan</h2>
            <p>Dosarul tău va apărea aici imediat ce echipa ExitBiz îl creează.</p>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
              <a href="/" class="btn-primary">Trimite o cerere →</a>
              <a href="https://wa.me/40772129941" target="_blank" class="btn-ghost">Scrie-ne pe WhatsApp</a>
            </div>
          </div>`;
        return;
      }

      // Load docs for all dosare
      const dosar = dosare[0]; // show primary dosar
      currentDosarId = dosar.id;

      const { data: docs } = await db
        .from('documente')
        .select('*')
        .eq('dosar_id', dosar.id)
        .order('created_at', { ascending: false });

      container.innerHTML = renderDosar(dosar, docs || []);

      // Realtime updates
      db.channel(`dosar-${dosar.id}`)
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'dosare',
          filter: `id=eq.${dosar.id}`
        }, () => loadPage())
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'documente',
          filter: `dosar_id=eq.${dosar.id}`
        }, () => loadPage())
        .subscribe();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'login.html';
    });

    loadPage();
  </script>
</body>
</html>
