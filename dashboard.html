<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ExitBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .db-nav { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .db-nav-right { display: flex; align-items: center; gap: 1rem; }
    .db-user { font-size: 14px; color: var(--text-secondary); }
    .db-main { max-width: 820px; margin: 0 auto; padding: 3rem 2rem; }
    .db-greeting { margin-bottom: 2.5rem; }
    .db-greeting h1 { font-size: 28px; font-weight: 300; color: var(--text-primary); margin-bottom: 0.25rem; }
    .db-greeting p { font-size: 15px; color: var(--text-secondary); }
    .dosar-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1.25rem; }
    .dosar-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    .dosar-title { font-size: 17px; font-weight: 500; color: var(--text-primary); }
    .dosar-meta { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .status-badge { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 99px; }
    .status-nou { background: #f0f0f0; color: #666; }
    .status-documente { background: #dbeafe; color: #1e40af; }
    .status-depus_onrc { background: #fef3c7; color: #92400e; }
    .status-in_procesare { background: #fef3c7; color: #92400e; }
    .status-finalizat { background: var(--green-light); color: var(--green-dark); }
    .status-timeline { display: flex; align-items: flex-start; gap: 0; margin-top: 0.5rem; }
    .timeline-step { flex: 1; position: relative; }
    .timeline-step:not(:last-child)::after { content: ''; position: absolute; top: 14px; left: calc(50% + 14px); right: calc(-50% + 14px); height: 2px; background: var(--border); z-index: 0; }
    .timeline-step.done:not(:last-child)::after { background: var(--green); }
    .timeline-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 12px; position: relative; z-index: 1; }
    .timeline-step.done .timeline-dot { background: var(--green); border-color: var(--green); color: #fff; }
    .timeline-step.active .timeline-dot { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .timeline-label { font-size: 11px; color: var(--text-secondary); text-align: center; line-height: 1.3; }
    .timeline-step.done .timeline-label { color: var(--green-dark); font-weight: 500; }
    .timeline-step.active .timeline-label { color: var(--green); font-weight: 500; }
    .dosar-notes { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .dosar-notes strong { color: var(--text-primary); }
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state h2 { font-size: 20px; font-weight: 400; color: var(--text-primary); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 15px; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .loading { text-align: center; padding: 4rem; color: var(--text-secondary); }
    .btn-sm { padding: 7px 16px; font-size: 13px; }
  </style>
</head>
<body>

  <nav class="db-nav">
    <a href="/" class="logo">exit<span>biz</span></a>
    <div class="db-nav-right">
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn lang-ro" data-lang="ro">RO</button>
        <button class="lang-btn lang-en" data-lang="en">EN</button>
      </div>
      <span class="db-user" id="user-email"></span>
      <button class="btn-ghost btn-sm" id="logout-btn" data-ro="Ieși din cont" data-en="Sign out">Ieși din cont</button>
    </div>
  </nav>

  <div class="db-main">
    <div class="db-greeting">
      <h1 id="greeting-title">Bună, <span id="user-name">—</span></h1>
      <p id="greeting-sub" data-ro="Statusul dosarelor tale active" data-en="Status of your active cases">Statusul dosarelor tale active</p>
    </div>

    <div id="dosare-container">
      <div class="loading" id="loading-msg" data-ro="Se încarcă dosarele..." data-en="Loading cases...">Se încarcă dosarele...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ---- BILINGUAL LABELS ----
    const LABELS = {
      ro: {
        steps: ['Lead', 'Diagnostic', 'Analiză', 'Documente', 'Pregătire', 'Depus', 'Finalizat'],
        services: {
          suspendare: 'Suspendare activitate',
          dizolvare:  'Dizolvare voluntară',
          radiere:    'Radiere ONRC',
          cabinet:    'Cabinet profesionist'
        },
        statuses: {
          lead:       'Lead',
          diagnostic: 'Diagnostic',
          analiza:    'Analiză',
          documente:  'Documente',
          pregatire:  'Pregătire',
          depus:      'Depus',
          finalizat:  'Finalizat'
        },
        cui_prefix: 'CUI',
        opened: 'Deschis pe',
        note_label: 'Notă de la ExitBiz',
        empty_title: 'Niciun dosar activ momentan',
        empty_sub: 'Dosarul tău va apărea aici imediat ce echipa ExitBiz îl creează.',
        how_title: 'Cum funcționează?',
        how_steps: [
          'Trimiți cererea prin formularul de pe site',
          'Echipa noastră creează dosarul și primești email de confirmare',
          'Urmărești statusul în timp real chiar aici'
        ],
        send_req: 'Trimite o cerere →',
        whatsapp: 'Scrie-ne pe WhatsApp',
        loading: 'Se încarcă dosarele...',
        greeting: 'Bună',
        sign_out: 'Ieși din cont',
      },
      en: {
        steps: ['Lead', 'Diagnostic', 'Analysis', 'Documents', 'Preparation', 'Filed', 'Completed'],
        services: {
          suspendare: 'Activity suspension',
          dizolvare:  'Voluntary dissolution',
          radiere:    'ONRC Strike-off',
          cabinet:    'Professional office'
        },
        statuses: {
          lead:       'Lead',
          diagnostic: 'Diagnostic',
          analiza:    'Analysis',
          documente:  'Documents',
          pregatire:  'Preparation',
          depus:      'Filed',
          finalizat:  'Completed'
        },
        cui_prefix: 'CUI',
        opened: 'Opened on',
        note_label: 'Note from ExitBiz',
        empty_title: 'No active cases yet',
        empty_sub: 'Your case will appear here as soon as the ExitBiz team creates it.',
        how_title: 'How does it work?',
        how_steps: [
          'Submit a request through the form on the site',
          'Our team creates the case and you receive a confirmation email',
          'Track the status in real time right here'
        ],
        send_req: 'Submit a request →',
        whatsapp: 'Message us on WhatsApp',
        loading: 'Loading cases...',
        greeting: 'Hi',
        sign_out: 'Sign out',
      }
    };

    function getLang() { return localStorage.getItem('lang') || 'ro'; }
    function L(key) { return LABELS[getLang()]?.[key] ?? LABELS.ro[key]; }

    const STEP_KEYS = ['lead', 'diagnostic', 'analiza', 'documente', 'pregatire', 'depus', 'finalizat'];

    function formatDate(iso) {
      const lang = getLang();
      return new Date(iso).toLocaleDateString(lang === 'en' ? 'en-GB' : 'ro-RO', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderTimeline(currentStatus) {
      const stepLabels = L('steps');
      const currentIndex = STEP_KEYS.indexOf(currentStatus);
      return STEP_KEYS.map((key, i) => {
        let cls = '', icon = '';
        if (i < currentIndex) { cls = 'done'; icon = '✓'; }
        else if (i === currentIndex) { cls = 'active'; icon = '●'; }
        else { icon = '○'; }
        return `<div class="timeline-step ${cls}">
          <div class="timeline-dot">${icon}</div>
          <div class="timeline-label">${stepLabels[i]}</div>
        </div>`;
      }).join('');
    }

    function renderDosar(d) {
      const serviceLabel = L('services')[d.service_type] || d.service_type;
      const statusLabel = L('statuses')[d.status] || d.status;
      const cuiPart = d.cui ? `${L('cui_prefix')}: ${d.cui} · ` : '';
      return `<div class="dosar-card">
        <div class="dosar-header">
          <div>
            <div class="dosar-title">${serviceLabel}</div>
            <div class="dosar-meta">${cuiPart}${L('opened')} ${formatDate(d.created_at)}</div>
          </div>
          <span class="status-badge status-${d.status}">${statusLabel}</span>
        </div>
        <div class="status-timeline">${renderTimeline(d.status)}</div>
        ${d.notes ? `<div class="dosar-notes"><strong>${L('note_label')}:</strong> ${d.notes}</div>` : ''}
      </div>`;
    }

    function renderEmpty() {
      const steps = L('how_steps');
      return `<div class="empty-state">
        <div style="font-size:48px;margin-bottom:1rem;">📋</div>
        <h2>${L('empty_title')}</h2>
        <p>${L('empty_sub')}</p>
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin:1.5rem auto;max-width:380px;text-align:left;">
          <p style="font-size:13px;font-weight:600;margin-bottom:0.75rem;color:var(--text-primary);">${L('how_title')}</p>
          <div style="display:flex;flex-direction:column;gap:0.6rem;">
            ${steps.map((s, i) => `<div style="font-size:13px;color:var(--text-secondary);display:flex;gap:8px;align-items:flex-start;"><span style="color:var(--green);font-weight:600;flex-shrink:0;">${i+1}.</span> ${s}</div>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <a href="/" class="btn-primary">${L('send_req')}</a>
          <a href="https://wa.me/40772129941" target="_blank" class="btn-ghost">${L('whatsapp')}</a>
        </div>
      </div>`;
    }

    let dosareData = [];

    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const user = session.user;
      document.getElementById('user-email').textContent = user.email;

      const { data: profile } = await db.from('profiles').select('full_name, role').eq('id', user.id).single();
      if (profile?.role === 'admin') { window.location.href = 'admin.html'; return; }

      const name = profile?.full_name || user.email;
      document.getElementById('user-name').textContent = name;
      document.getElementById('greeting-title').innerHTML = `${L('greeting')}, <span id="user-name">${name}</span>`;

      const { data: dosare, error } = await db
        .from('dosare')
        .select('*')
        .eq('client_email', user.email)
        .order('created_at', { ascending: false });

      dosareData = dosare || [];
      const container = document.getElementById('dosare-container');

      if (error || !dosareData.length) {
        container.innerHTML = renderEmpty();
        return;
      }

      container.innerHTML = dosareData.map(renderDosar).join('');

      db.channel('dosare-changes')
        .on('postgres_changes', {
          event: 'UPDATE', schema: 'public', table: 'dosare',
          filter: `client_email=eq.${user.email}`
        }, payload => {
          dosareData = dosareData.map(d => d.id === payload.new.id ? payload.new : d);
          container.innerHTML = dosareData.map(renderDosar).join('');
        })
        .subscribe();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'login.html';
    });

    init();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
